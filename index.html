<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NCYSD World Cup 2026</title>
  <meta property="og:title"       content="NCYSD World Cup 2026">
  <meta property="og:description" content="Friend group bracket pool — track your teams through the knockout rounds.">
  <meta property="og:image"       content="https://ncysdworldcup2026.netlify.app/og-image.png">
  <meta property="og:url"         content="https://ncysdworldcup2026.netlify.app/">
  <meta property="og:type"        content="website">
  <meta name="twitter:card"       content="summary_large_image">
  <meta name="twitter:image"      content="https://ncysdworldcup2026.netlify.app/og-image.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Design tokens ───────────────────────────────────────────── */
    :root {
      --bg:          linear-gradient(155deg, #faf8f3 0%, #f5f0e8 50%, #faf7f0 100%);
      --glass:       rgba(255,255,255,0.72);
      --glass-hover: rgba(255,255,255,0.88);
      --border:      rgba(180,150,100,0.18);
      --border-mid:  rgba(180,150,100,0.32);
      --text:        #3d2f1a;
      --text-sub:    #7a6145;
      --text-faint:  #b09a7a;
      --green:       #16a34a;
      --green-glow:  rgba(22,163,74,0.12);
      --gold:        #ca8a04;
      --gold-glow:   rgba(202,138,4,0.15);
      --red:         #dc2626;
      --connector:   rgba(180,150,100,0.25);
    }

    body {
      background: var(--bg); background-attachment: fixed;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      min-height: 100vh;
    }

    /* ── Header ──────────────────────────────────────────────────── */
    header {
      text-align: center;
      padding: 48px 20px 28px;
      border-bottom: 1px solid var(--border);
    }
    header h1 {
      font-size: clamp(1.4rem, 4vw, 2.4rem); font-weight: 800; letter-spacing: -0.5px;
      color: var(--text);
    }
    header p { margin-top: 10px; color: var(--text-sub); font-size: 0.85rem; letter-spacing: 0.4px; }
/* ── Legend ──────────────────────────────────────────────────── */
    .legend {
      display: flex; flex-wrap: wrap; justify-content: center;
      gap: 5px 12px; padding: 16px 24px 0; max-width: 960px; margin: 0 auto;
    }
    .legend-item { font-size: 0.67rem; color: var(--text-faint); }
    .legend-item b { color: var(--text-sub); font-weight: 600; }

    /* ── Bracket ─────────────────────────────────────────────────── */
    .bracket-wrapper { overflow-x: auto; padding: 28px 32px 64px; -webkit-overflow-scrolling: touch; }
    .bracket { display: flex; align-items: flex-start; gap: 6px; min-width: max-content; margin: 0 auto; }

    .round-col { display: flex; flex-direction: column; }
    .round-label {
      height: 30px; display: flex; align-items: center; justify-content: center;
      font-size: 0.58rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1.6px; color: var(--text-faint);
    }
    .final-col .round-label {
      color: var(--gold); letter-spacing: 2px;
    }
    .slot { display: flex; align-items: center; justify-content: center; padding: 4px 0; }

    /* ── Match card ──────────────────────────────────────────────── */
    .match {
      width: 172px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden; flex-shrink: 0;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      transition: border-color 0.35s, box-shadow 0.35s, background 0.35s;
      cursor: pointer;
    }
    .match:hover {
      background: var(--glass-hover);
      border-color: var(--border-mid);
      box-shadow: 0 6px 28px rgba(0,0,0,0.45);
    }

    /* Final card — gold shimmer */
    .final-col .match {
      width: 174px;
      background: rgba(202,138,4,0.06);
      border-color: rgba(202,138,4,0.35);
      box-shadow: 0 0 24px var(--gold-glow), 0 4px 16px rgba(0,0,0,0.08);
    }
    .final-col .match:hover {
      box-shadow: 0 0 36px var(--gold-glow), 0 6px 24px rgba(0,0,0,0.1);
    }

    /* ── Match footer ────────────────────────────────────────────── */
    .match-footer {
      font-size: 0.57rem; color: var(--text-faint); text-align: center;
      padding: 3px 6px 4px; border-top: 1px solid var(--border);
      letter-spacing: 0.3px;
    }
    .match-footer.live  { color: var(--red); font-weight: 700; letter-spacing: 1px; }
    .match-footer.final { color: var(--text-sub); }
    .match-venue {
      font-size: 0.53rem; color: var(--text-faint); text-align: center;
      padding: 2px 6px 4px; letter-spacing: 0.2px; opacity: 0.8;
    }

    /* ── Team row ────────────────────────────────────────────────── */
    .team { padding: 8px 10px 7px; display: flex; align-items: center; position: relative; }
    .team:first-child { border-bottom: 1px solid var(--border); }
    .team { transition: background 0.35s, opacity 0.35s; }

    .team.winner { background: var(--green-glow); }
    .team.loser  { opacity: 0.28; }

    .flag { font-size: 0.9rem; flex-shrink: 0; margin-right: 6px; }

    .team-info { flex: 1; min-width: 0; }
    .team-name {
      font-size: 0.76rem; font-weight: 600; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; color: var(--text);
    }
    .team-name.tbd { color: var(--text-faint); font-style: italic; font-weight: 400; }
    .owner { font-size: 0.62rem; color: var(--text-faint); white-space: nowrap; }

    .score {
      font-size: 0.82rem; font-weight: 700; color: var(--text-sub);
      margin-left: 6px; flex-shrink: 0; transition: color 0.35s;
    }
    .score.winning { color: var(--green); }

    /* ── Winner glow ─────────────────────────────────────────────── */
    .match.has-winner .team.winner {
      box-shadow: inset 3px 0 0 var(--green);
    }
    .final-col .match.has-winner .team.winner {
      box-shadow: inset 3px 0 0 var(--gold);
    }

    /* ── Connector lines ─────────────────────────────────────────── */
    .connector-col { width: 14px; display: flex; flex-direction: column; }
    .conn-pair { position: relative; flex-shrink: 0; }

    .left-conn .conn-pair::before {
      content: ''; position: absolute; top: 25%; left: 0;
      width: 100%; height: 50%;
      border-top: 1px solid var(--connector);
      border-right: 1px solid var(--connector);
      border-bottom: 1px solid var(--connector);
    }
    .right-conn .conn-pair::before {
      content: ''; position: absolute; top: 25%; left: 0;
      width: 100%; height: 50%;
      border-top: 1px solid var(--connector);
      border-left: 1px solid var(--connector);
      border-bottom: 1px solid var(--connector);
    }
    /* Trophy above Final */
    .slot.final-slot { flex-direction: column; gap: 10px; }
    .trophy-icon { font-size: 2.2rem; line-height: 1; text-align: center; }

    .straight-conn { position: relative; width: 14px; }
    .straight-conn::before {
      content: ''; position: absolute; top: 50%; left: 0;
      width: 100%; height: 0;
      border-top: 1px solid var(--connector);
    }

    /* ── Leaderboard ─────────────────────────────────────────────── */
    .leaderboard-section { max-width: 980px; margin: 0 auto; padding: 0 24px 72px; }
    .leaderboard-title {
      font-size: 0.6rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 2px; color: var(--text-faint); text-align: center;
      padding: 28px 0 18px; border-top: 1px solid var(--border);
    }
    .leaderboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(178px, 1fr));
      gap: 10px;
    }
    .lb-card {
      background: var(--glass); border: 1px solid var(--border); border-radius: 10px;
      padding: 13px 15px;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .lb-card.leader {
      border-color: rgba(22,163,74,0.5);
      background: rgba(22,163,74,0.08);
      box-shadow: 0 0 16px rgba(22,163,74,0.12);
    }
    .lb-name { font-size: 0.85rem; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .lb-counts { font-size: 0.65rem; color: var(--text-sub); margin-bottom: 8px; }
    .lb-counts b { color: var(--green); }
    .lb-teams { display: flex; flex-direction: column; gap: 3px; }
    .lb-team { font-size: 0.71rem; color: var(--text-sub); white-space: nowrap; }
    .lb-team.out { color: var(--text-faint); text-decoration: line-through; opacity: 0.6; }
    .lb-rank { font-size: 0.65rem; color: var(--text-faint); float: right; }

    /* ── Match detail modal ──────────────────────────────────────── */
    #match-modal {
      display: none; position: fixed; inset: 0; z-index: 500;
      align-items: center; justify-content: center;
    }
    #match-modal.open { display: flex; }
    .modal-backdrop {
      position: absolute; inset: 0;
      background: rgba(40,28,10,0.45);
      backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
    }
    .modal-scene { position: relative; perspective: 1000px; }
    .modal-card {
      width: 340px; min-height: 260px;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.55s ease;
    }
    .modal-card.flipped { transform: rotateY(180deg); }
    .modal-front, .modal-back {
      width: 100%; min-height: 260px;
      backface-visibility: hidden; -webkit-backface-visibility: hidden;
      border-radius: 14px;
      background: var(--glass);
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      border: 1px solid var(--border-mid);
      box-shadow: 0 12px 40px rgba(0,0,0,0.25);
      padding: 18px 16px 14px;
    }
    .modal-back {
      position: absolute; inset: 0;
      transform: rotateY(180deg);
      overflow-y: auto;
    }
    .modal-close {
      position: absolute; top: 10px; right: 12px;
      background: none; border: none; cursor: pointer;
      font-size: 1rem; color: var(--text-faint); line-height: 1;
      padding: 2px 4px; border-radius: 4px;
    }
    .modal-close:hover { color: var(--text); background: rgba(0,0,0,0.06); }
    .modal-teams {
      display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px;
    }
    .modal-team-row {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 0.85rem; font-weight: 600; color: var(--text);
    }
    .modal-team-row .score {
      font-size: 1.2rem; font-weight: 800; color: var(--text); min-width: 22px; text-align: center;
    }
    .modal-team-row.winner { color: var(--green); }
    .modal-team-row .owner-tag {
      font-size: 0.62rem; font-weight: 400; color: var(--text-faint); margin-left: 6px;
    }
    .modal-meta {
      font-size: 0.62rem; color: var(--text-faint); text-align: center;
      border-top: 1px solid var(--border); padding-top: 8px; letter-spacing: 0.3px;
    }
    .modal-section-title {
      font-size: 0.62rem; font-weight: 700; letter-spacing: 1px;
      color: var(--text-sub); text-transform: uppercase;
      margin: 12px 0 6px;
    }
    .modal-scorers { display: flex; flex-direction: column; gap: 4px; }
    .modal-scorer-row {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.74rem; color: var(--text);
    }
    .modal-scorer-row .minute {
      font-size: 0.62rem; color: var(--text-faint); min-width: 28px;
    }
    .modal-scorer-row .goal-type {
      font-size: 0.62rem; color: var(--text-faint); margin-left: 2px;
    }
    .modal-stats-grid {
      display: grid; grid-template-columns: 1fr auto 1fr;
      gap: 5px 8px; align-items: center;
    }
    .stat-val-a { text-align: right; font-size: 0.78rem; font-weight: 600; color: var(--text); }
    .stat-label { text-align: center; font-size: 0.58rem; color: var(--text-faint); letter-spacing: 0.3px; }
    .stat-val-b { text-align: left; font-size: 0.78rem; font-weight: 600; color: var(--text); }
    .stat-bar-row {
      grid-column: 1 / -1;
      display: flex; height: 3px; border-radius: 2px; overflow: hidden;
      margin-bottom: 2px;
    }
    .stat-bar-a { background: var(--gold); }
    .stat-bar-b { background: var(--border-mid); }
    .modal-pks { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin-top: 4px; }
    .pk-shot {
      font-size: 0.68rem; padding: 2px 6px; border-radius: 4px;
      border: 1px solid var(--border);
    }
    .pk-shot.scored { color: var(--green); border-color: var(--green); }
    .pk-shot.missed { color: var(--red); border-color: var(--red); opacity: 0.7; }
    .modal-empty { font-size: 0.72rem; color: var(--text-faint); text-align: center; padding: 20px 0; }
  </style>
</head>
<body>

<div id="match-modal">
  <div class="modal-backdrop" onclick="closeMatchModal()"></div>
  <div class="modal-scene">
    <div class="modal-card" id="modal-card">
      <div class="modal-front" id="modal-front"></div>
      <div class="modal-back" id="modal-back">
        <button class="modal-close" onclick="closeMatchModal()">✕</button>
        <div id="modal-back-content"></div>
      </div>
    </div>
  </div>
</div>

<header>
  <h1>⚽ NCYSD World Cup 2026</h1>
  <p>$20 buy-in &nbsp;·&nbsp; 5 teams each &nbsp;·&nbsp; Belgium = money back</p>
</header>

<div class="legend" id="legend"></div>
<div class="bracket-wrapper"><div class="bracket" id="bracket"></div></div>
<div class="leaderboard-section">
  <div class="leaderboard-title">Leaderboard</div>
  <div class="leaderboard-grid" id="leaderboard"></div>
</div>

<script>
/* ── OWNERSHIP (hardcoded – never AI-generated) ──────────────────────────── */
const OWNERSHIP = {
  "Czechia":"Jeffrey","France":"Jeffrey","South Africa":"Jeffrey","Bosnia":"Jeffrey","Canada":"Jeffrey",
  "Ecuador":"Mitchell","Paraguay":"Mitchell","Austria":"Mitchell","Japan":"Mitchell","Brazil":"Mitchell",
  "Algeria":"Ryan","Iran":"Ryan","Saudi Arabia":"Ryan","England":"Ryan","Germany":"Ryan",
  "Uzbekistan":"Becky","Congo":"Becky","Mexico":"Becky","Senegal":"Becky","Curacao":"Becky",
  "Australia":"Anna","Netherlands":"Anna","Portugal":"Anna","New Zealand":"Anna","USA":"Anna",
  "Croatia":"Trevor","Jordan":"Trevor","Switzerland":"Trevor","Ghana":"Trevor","Tunisia":"Trevor",
  "Morocco":"Rachel","Cape Verde":"Rachel","Panama":"Rachel","Colombia":"Rachel","Spain":"Rachel",
  "Qatar":"Erin","Egypt":"Erin","Ivory Coast":"Erin","Iraq":"Erin","Uruguay":"Erin",
  "Sweden":"Brenton","Argentina":"Brenton","South Korea":"Brenton","Scotland":"Brenton","Norway":"Brenton",
  "Belgium":"Unowned",
};

const FLAGS = {
  "Czechia":"🇨🇿","France":"🇫🇷","South Africa":"🇿🇦","Bosnia":"🇧🇦","Canada":"🇨🇦",
  "Ecuador":"🇪🇨","Paraguay":"🇵🇾","Austria":"🇦🇹","Japan":"🇯🇵","Brazil":"🇧🇷",
  "Algeria":"🇩🇿","Iran":"🇮🇷","Saudi Arabia":"🇸🇦","England":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","Germany":"🇩🇪",
  "Uzbekistan":"🇺🇿","Congo":"🇨🇩","Mexico":"🇲🇽","Senegal":"🇸🇳","Curacao":"🇨🇼",
  "Australia":"🇦🇺","Netherlands":"🇳🇱","Portugal":"🇵🇹","New Zealand":"🇳🇿","USA":"🇺🇸",
  "Croatia":"🇭🇷","Jordan":"🇯🇴","Switzerland":"🇨🇭","Ghana":"🇬🇭","Tunisia":"🇹🇳",
  "Morocco":"🇲🇦","Cape Verde":"🇨🇻","Panama":"🇵🇦","Colombia":"🇨🇴","Spain":"🇪🇸",
  "Qatar":"🇶🇦","Egypt":"🇪🇬","Ivory Coast":"🇨🇮","Iraq":"🇮🇶","Uruguay":"🇺🇾",
  "Sweden":"🇸🇪","Argentina":"🇦🇷","South Korea":"🇰🇷","Scotland":"🏴󠁧󠁢󠁳󠁣󠁴󠁿","Norway":"🇳🇴",
  "Belgium":"🇧🇪",
};

/* ── OWNER LEGEND ────────────────────────────────────────────────────────── */
const OWNERS = [
  {name:"Jeffrey", teams:["Czechia","France","South Africa","Bosnia","Canada"]},
  {name:"Mitchell",teams:["Ecuador","Paraguay","Austria","Japan","Brazil"]},
  {name:"Ryan",    teams:["Algeria","Iran","Saudi Arabia","England","Germany"]},
  {name:"Becky",   teams:["Uzbekistan","Congo","Mexico","Senegal","Curacao"]},
  {name:"Anna",    teams:["Australia","Netherlands","Portugal","New Zealand","USA"]},
  {name:"Trevor",  teams:["Croatia","Jordan","Switzerland","Ghana","Tunisia"]},
  {name:"Rachel",  teams:["Morocco","Cape Verde","Panama","Colombia","Spain"]},
  {name:"Erin",    teams:["Qatar","Egypt","Ivory Coast","Iraq","Uruguay"]},
  {name:"Brenton", teams:["Sweden","Argentina","South Korea","Scotland","Norway"]},
];

document.getElementById("legend").innerHTML = OWNERS
  .map(o => `<div class="legend-item"><b>${o.name}:</b> ${o.teams.map(t=>(FLAGS[t]||"")+" "+t).join(", ")}</div>`)
  .join("");

/* ── BRACKET STRUCTURE (worldcupwiki.com match numbers) ─────────────────── */
//
// LEFT side (top-to-bottom in column) → R16 → QF → SF → FINAL
// RIGHT side mirrors: FINAL ← SF ← QF ← R16 ← R32 (top-to-bottom)
//
// Each pair in R32 feeds the R16 slot directly across from it:
//   R32 slots [0,1] → R16 slot 0
//   R32 slots [2,3] → R16 slot 1
//   etc.
//
const BRACKET = {
  left_r32:  [73, 75, 74, 77, 81, 82, 83, 84],
  left_r16:  [90, 89, 94, 93],
  left_qf:   [97, 98],
  left_sf:   [101],
  final:     [104],
  right_sf:  [102],
  right_qf:  [99, 100],
  right_r16: [91, 92, 96, 95],
  right_r32: [76, 78, 79, 80, 85, 87, 86, 88],
};

/* ── INITIAL MATCH DATA (from worldcupwiki — partial teams known Jun 25) ── */
const INITIAL = {
  73: {teamA:"South Africa", teamB:"Canada",      date:"20260628", timeET:"3:00 PM"},
  74: {teamA:"Germany",      teamB:null,           date:"20260629", timeET:"4:30 PM"},
  75: {teamA:null,           teamB:"Morocco",      date:"20260629", timeET:"9:00 PM"},
  76: {teamA:"Brazil",       teamB:null,           date:"20260629", timeET:"1:00 PM"},
  77: {teamA:null,           teamB:null,           date:"20260630", timeET:"5:00 PM"},
  78: {teamA:null,           teamB:null,           date:"20260630", timeET:"1:00 PM"},
  79: {teamA:"Mexico",       teamB:null,           date:"20260630", timeET:"9:00 PM"},
  80: {teamA:null,           teamB:null,           date:"20260701", timeET:"12:00 PM"},
  81: {teamA:"USA",          teamB:null,           date:"20260701", timeET:"8:00 PM"},
  82: {teamA:null,           teamB:null,           date:"20260701", timeET:"4:00 PM"},
  83: {teamA:null,           teamB:null,           date:"20260702", timeET:"7:00 PM"},
  84: {teamA:null,           teamB:null,           date:"20260702", timeET:"3:00 PM"},
  85: {teamA:"Switzerland",  teamB:null,           date:"20260702", timeET:"11:00 PM"},
  86: {teamA:"Argentina",    teamB:null,           date:"20260703", timeET:"6:00 PM"},
  87: {teamA:null,           teamB:null,           date:"20260703", timeET:"9:30 PM"},
  88: {teamA:null,           teamB:null,           date:"20260703", timeET:"2:00 PM"},
  89:  {date:"20260704", timeET:"5:00 PM"},
  90:  {date:"20260704", timeET:"1:00 PM"},
  91:  {date:"20260705", timeET:"4:00 PM"},
  92:  {date:"20260705", timeET:"8:00 PM"},
  93:  {date:"20260706", timeET:"3:00 PM"},
  94:  {date:"20260706", timeET:"8:00 PM"},
  95:  {date:"20260707", timeET:"12:00 PM"},
  96:  {date:"20260707", timeET:"4:00 PM"},
  97:  {date:"20260709", timeET:"4:00 PM"},
  98:  {date:"20260710", timeET:"3:00 PM"},
  99:  {date:"20260711", timeET:"5:00 PM"},
  100: {date:"20260711", timeET:"9:00 PM"},
  101: {date:"20260714", timeET:"3:00 PM"},
  102: {date:"20260715", timeET:"3:00 PM"},
  104: {date:"20260719", timeET:"3:00 PM"},
};

/* ── STATE ───────────────────────────────────────────────────────────────── */
// matches: matchNum → { teamA, teamB, scoreA, scoreB, status, winner }
//   status: "upcoming" | "live" | "final"
//   winner: "A" | "B" | null
const state = { matches: {} };

function initState() {
  for (const [num, d] of Object.entries(INITIAL)) {
    state.matches[+num] = {
      teamA: d.teamA || null,
      teamB: d.teamB || null,
      scoreA: null, scoreB: null,
      status: "upcoming", winner: null,
      timeET: d.timeET, date: d.date,
      venue: null,
    };
  }
}

/* ── ESPN NAME NORMALIZATION ─────────────────────────────────────────────── */
// Strip accents/punctuation/spaces for fuzzy matching
function norm(s) { return s.toLowerCase().replace(/[^a-z]/g, ""); }

const ESPN_TO_MINE = {
  "unitedstates": "USA",
  "cotedivoire":  "Ivory Coast",
  "curacao":      "Curacao",       // strips ç→ same
  "bosniaandherzegovina": "Bosnia",
  "drcongo":      "Congo",
  "republicofcongo": "Congo",
  "capeverde":    "Cape Verde",
  "southkorea":   "South Korea",
};

function espnName(raw) {
  const key = norm(raw);
  return ESPN_TO_MINE[key] || raw;
}

/* ── BUILD TEAM LOOKUP (team name → match slot) ──────────────────────────── */
function buildTeamLookup() {
  const map = {};
  for (const [num, m] of Object.entries(state.matches)) {
    if (m.teamA) map[norm(m.teamA)] = +num;
    if (m.teamB) map[norm(m.teamB)] = +num;
  }
  return map;
}

/* ── FETCH ESPN ──────────────────────────────────────────────────────────── */
const ESPN = "https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard";

const KNOCKOUT_DATES = [
  "20260628","20260629","20260630",
  "20260701","20260702","20260703",
  "20260704","20260705","20260706","20260707",
  "20260709","20260710","20260711",
  "20260714","20260715","20260719",
];

async function fetchESPN() {
  const results = await Promise.all(
    KNOCKOUT_DATES.map(d =>
      fetch(`${ESPN}?dates=${d}`)
        .then(r => r.json())
        .then(j => j.events || [])
        .catch(() => [])
    )
  );
  return results.flat();
}

/* ── PROCESS ESPN EVENTS INTO STATE ──────────────────────────────────────── */
function processEvents(events) {
  const lookup = buildTeamLookup();

  for (const ev of events) {
    const comp = ev.competitions?.[0];
    if (!comp) continue;
    const [c0, c1] = comp.competitors || [];
    if (!c0 || !c1) continue;

    const tA = espnName(c0.team?.displayName || "");
    const tB = espnName(c1.team?.displayName || "");
    const sA = c0.score ?? null;
    const sB = c1.score ?? null;
    const wA = c0.winner === true;
    const wB = c1.winner === true;
    const espnStatus = ev.status?.type?.name || "";

    // Find which bracket slot this event belongs to
    const slotA = lookup[norm(tA)];
    const slotB = lookup[norm(tB)];
    const slotNum = slotA ?? slotB;
    if (!slotNum || !state.matches[slotNum]) continue;

    const m = state.matches[slotNum];

    // Fill unknown teams
    if (!m.teamA || norm(m.teamA) === norm(tA)) { m.teamA = tA; }
    if (!m.teamB || norm(m.teamB) === norm(tB)) { m.teamB = tB; }
    // If we found via one team and the other was TBD, fill it in
    if (slotA && !slotB) { m.teamB = tB; lookup[norm(tB)] = slotNum; }
    if (slotB && !slotA) { m.teamA = tA; lookup[norm(tA)] = slotNum; }

    m.eventId = ev.id || null;
    m.scoreA = sA;
    m.scoreB = sB;
    m.status = espnStatus === "STATUS_FULL_TIME"    ? "final"
             : espnStatus === "STATUS_IN_PROGRESS"  ? "live"
             : "upcoming";
    m.winner = wA ? "A" : wB ? "B" : null;

    const v = comp.venue;
    if (v) {
      const city  = v.address?.city;
      const state2 = v.address?.state;
      const country = v.address?.country;
      if (city) {
        m.venue = (state2 && country === "US") ? `${city}, ${state2}` : city;
      } else if (v.fullName) {
        m.venue = v.fullName;
      }
    }
  }
}

/* ── TIME CONVERSION: ET → PT (PT = ET − 3h in summer) ──────────────────── */
function etToPT(timeET) {
  if (!timeET) return "";
  const [time, period] = timeET.split(" ");
  let [h, m] = time.split(":").map(Number);
  if (period === "PM" && h !== 12) h += 12;
  if (period === "AM" && h === 12) h = 0;
  h -= 3;
  if (h < 0) h += 24;
  const ampm = h >= 12 ? "PM" : "AM";
  const h12  = h % 12 || 12;
  return `${h12}:${String(m).padStart(2,"0")} ${ampm} PT`;
}

const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function formatDate(dateStr) {
  if (!dateStr) return "";
  const m = +dateStr.slice(4, 6), d = +dateStr.slice(6, 8);
  return `${MONTHS[m - 1]} ${d}`;
}

/* ── RENDER ──────────────────────────────────────────────────────────────── */
function teamRowHTML(teamKey, m) {
  const name = m[teamKey] || null;
  const isWinner = m.winner === (teamKey === "teamA" ? "A" : "B");
  const isLoser   = m.winner && !isWinner && m.status === "final";
  const score     = teamKey === "teamA" ? m.scoreA : m.scoreB;

  if (!name) {
    return `<div class="team"><div class="flag"></div><div class="team-info"><div class="team-name tbd">TBD</div></div></div>`;
  }

  const flag  = FLAGS[name]     || "🏳️";
  const owner = OWNERSHIP[name] || "";
  const scoreHTML = score != null
    ? `<div class="score${isWinner ? " winning" : ""}">${score}</div>` : "";

  return `<div class="team${isWinner?" winner":""}${isLoser?" loser":""}">
    <span class="flag">${flag}</span>
    <div class="team-info">
      <div class="team-name">${name}</div>
      ${owner ? `<div class="owner">${owner}</div>` : ""}
    </div>
    ${scoreHTML}
  </div>`;
}

function matchCardHTML(matchNum) {
  const m = state.matches[matchNum];
  if (!m) return `<div class="match"><div class="team"><div class="team-name tbd">TBD</div></div><div class="team"><div class="team-name tbd">TBD</div></div></div>`;

  const hasWinner = m.winner && m.status === "final";
  const footerCls = m.status === "live" ? "live" : m.status === "final" ? "final" : "";
  let footer = "";
  if (m.status === "live")       footer = "🔴 LIVE";
  else if (m.status === "final") footer = `FINAL · ${formatDate(m.date)}`;
  else if (m.timeET)             footer = `${formatDate(m.date)} · ${etToPT(m.timeET)}`;

  return `<div class="match${hasWinner ? " has-winner" : ""}" onclick="openMatchModal(${matchNum})" title="Click for match details">
    ${teamRowHTML("teamA", m)}
    ${teamRowHTML("teamB", m)}
    ${footer ? `<div class="match-footer ${footerCls}">${footer}</div>` : ""}
    ${m.venue ? `<div class="match-venue">📍 ${m.venue}</div>` : ""}
  </div>`;
}

// Bracket tree connector columns
function buildConnector(numPairs, slotPx, direction) {
  const pairHeight = slotPx * 2;
  const pairs = Array.from({length: numPairs}, () =>
    `<div class="conn-pair" style="height:${pairHeight}px"></div>`
  ).join("");
  return `<div class="round-col">
    <div class="round-label"></div>
    <div class="connector-col ${direction}-conn">${pairs}</div>
  </div>`;
}

function buildConnectorStraight() {
  return `<div class="round-col">
    <div class="round-label"></div>
    <div class="straight-conn" style="height:${H}px"></div>
  </div>`;
}

function buildCol(label, matchNums, slotPx, cls = "") {
  const isFinal = cls === "final-col";
  const slots = matchNums
    .map(n => `<div class="slot${isFinal ? " final-slot" : ""}" style="height:${slotPx}px">${isFinal ? '<div class="trophy-icon">🏆</div>' : ""}${matchCardHTML(n)}</div>`)
    .join("");
  return `<div class="round-col ${cls}">
    <div class="round-label">${label}</div>${slots}</div>`;
}

const H = 1040; // total bracket height px; slot = H / count

function render() {
  document.getElementById("bracket").innerHTML = [
    buildCol("Round of 32",   BRACKET.left_r32,  H/8),
    buildConnector(4, H/8, "left"),
    buildCol("Round of 16",   BRACKET.left_r16,  H/4),
    buildConnector(2, H/4, "left"),
    buildCol("Quarterfinals", BRACKET.left_qf,   H/2),
    buildConnector(1, H/2, "left"),
    buildCol("Semifinals",    BRACKET.left_sf,   H),
    buildConnectorStraight(),
    buildCol("⚽ Final",       BRACKET.final,     H,   "final-col"),
    buildConnectorStraight(),
    buildCol("Semifinals",    BRACKET.right_sf,  H),
    buildConnector(1, H/2, "right"),
    buildCol("Quarterfinals", BRACKET.right_qf,  H/2),
    buildConnector(2, H/4, "right"),
    buildCol("Round of 16",   BRACKET.right_r16, H/4),
    buildConnector(4, H/8, "right"),
    buildCol("Round of 32",   BRACKET.right_r32, H/8),
  ].join("");
}

/* ── LEADERBOARD ─────────────────────────────────────────────────────────── */
function computeLeaderboard() {
  const eliminated = new Set();
  for (const m of Object.values(state.matches)) {
    if (m.status !== "final" || !m.winner) continue;
    const loser = m.winner === "A" ? m.teamB : m.teamA;
    if (loser) eliminated.add(loser);
  }

  return OWNERS
    .map(o => ({
      name:  o.name,
      alive: o.teams.filter(t => !eliminated.has(t)),
      out:   o.teams.filter(t =>  eliminated.has(t)),
    }))
    .sort((a, b) => b.alive.length - a.alive.length || a.out.length - b.out.length);
}

function renderLeaderboard() {
  const rows = computeLeaderboard();
  const maxAlive = rows[0]?.alive.length ?? 0;

  document.getElementById("leaderboard").innerHTML = rows.map((r, i) => {
    const isLeader = r.alive.length === maxAlive && maxAlive > 0;
    const teamRows = [
      ...r.alive.map(t => `<div class="lb-team">${FLAGS[t] || ""} ${t}</div>`),
      ...r.out.map(t   => `<div class="lb-team out">${FLAGS[t] || ""} ${t}</div>`),
    ].join("");

    return `<div class="lb-card${isLeader ? " leader" : ""}">
      <div class="lb-name">${i + 1}. ${r.name} <span class="lb-rank"></span></div>
      <div class="lb-counts"><b>${r.alive.length}</b> alive · ${r.out.length} out</div>
      <div class="lb-teams">${teamRows}</div>
    </div>`;
  }).join("");
}

/* ── LOADING OVERLAY ─────────────────────────────────────────────────────── */
/* ── MATCH DETAIL MODAL ──────────────────────────────────────────────────── */
const summaryCache = {};

function openMatchModal(matchNum) {
  const m = state.matches[matchNum];
  if (!m) return;

  const modal = document.getElementById("match-modal");
  const card  = document.getElementById("modal-card");
  const front = document.getElementById("modal-front");
  const back  = document.getElementById("modal-back-content");

  card.classList.remove("flipped");
  front.innerHTML = buildModalFront(m);
  back.innerHTML  = '<div class="modal-empty">Loading…</div>';
  modal.classList.add("open");

  setTimeout(() => card.classList.add("flipped"), 320);

  if (m.eventId) {
    fetchSummary(m.eventId).then(data => {
      back.innerHTML = buildModalBack(data, m);
    }).catch(() => {
      back.innerHTML = '<div class="modal-empty">Stats not yet available</div>';
    });
  } else if (m.status === "upcoming") {
    back.innerHTML = '<div class="modal-empty">Stats available after kickoff</div>';
  } else {
    back.innerHTML = '<div class="modal-empty">No data available</div>';
  }
}

function closeMatchModal() {
  const modal = document.getElementById("match-modal");
  const card  = document.getElementById("modal-card");
  card.classList.remove("flipped");
  setTimeout(() => modal.classList.remove("open"), 600);
}

async function fetchSummary(eventId) {
  if (summaryCache[eventId]) return summaryCache[eventId];
  const r = await fetch(
    `https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/summary?event=${eventId}`
  );
  const data = await r.json();
  summaryCache[eventId] = data;
  return data;
}

function buildModalFront(m) {
  const winA = m.winner === "A";
  const winB = m.winner === "B";
  const tA   = m.teamA || "TBD";
  const tB   = m.teamB || "TBD";
  const owA  = OWNERSHIP[tA] || "";
  const owB  = OWNERSHIP[tB] || "";

  const scoreBlock = m.scoreA != null
    ? `<span class="score">${m.scoreA}</span>`
    : `<span class="score" style="opacity:0.2">–</span>`;
  const scoreBlockB = m.scoreB != null
    ? `<span class="score">${m.scoreB}</span>`
    : `<span class="score" style="opacity:0.2">–</span>`;

  let meta = "";
  if (m.status === "live")       meta = "🔴 LIVE";
  else if (m.status === "final") meta = `FINAL · ${formatDate(m.date)}`;
  else if (m.timeET)             meta = `${formatDate(m.date)} · ${etToPT(m.timeET)}`;
  if (m.venue) meta += (meta ? " · " : "") + m.venue;

  return `
    <button class="modal-close" onclick="closeMatchModal()">✕</button>
    <div class="modal-teams">
      <div class="modal-team-row${winA ? " winner" : ""}">
        <span>${tA}${owA ? `<span class="owner-tag">${owA}</span>` : ""}</span>
        ${scoreBlock}
      </div>
      <div class="modal-team-row${winB ? " winner" : ""}">
        <span>${tB}${owB ? `<span class="owner-tag">${owB}</span>` : ""}</span>
        ${scoreBlockB}
      </div>
    </div>
    ${meta ? `<div class="modal-meta">${meta}</div>` : ""}`;
}

function buildModalBack(data, m) {
  let html = "";

  // Goal scorers
  const plays = (data.scoringPlays || []).filter(p => !p.shootoutScore);
  if (plays.length) {
    html += `<div class="modal-section-title">⚽ Scorers</div><div class="modal-scorers">`;
    for (const p of plays) {
      const name    = p.athletesInvolved?.[0]?.shortName || p.athletesInvolved?.[0]?.displayName || "Unknown";
      const min     = p.clock?.displayValue || "";
      const typeRaw = (p.type?.text || p.scoringType?.displayName || "").toLowerCase();
      const tag     = typeRaw.includes("penalty") ? " (pen)" : typeRaw.includes("own") ? " (og)" : "";
      const teamAbv = p.team?.abbreviation || "";
      html += `<div class="modal-scorer-row"><span class="minute">${min}</span><span>${teamAbv} – ${name}${tag}</span></div>`;
    }
    html += `</div>`;
  }

  // Stats
  const statsTeams = data.statistics?.[0]?.teams || data.statistics?.teams || [];
  const STAT_KEYS = [
    {name:"possessionPct",  label:"Possession"},
    {name:"shotsOnTarget",  label:"Shots on Target"},
    {name:"shots",          label:"Total Shots"},
    {name:"cornerKicks",    label:"Corners"},
    {name:"fouls",          label:"Fouls"},
    {name:"yellowCards",    label:"Yellow Cards"},
    {name:"redCards",       label:"Red Cards"},
  ];
  if (statsTeams.length >= 2) {
    const getVal = (teamIdx, key) => {
      const stats = statsTeams[teamIdx]?.statistics || [];
      return stats.find(s => s.name === key)?.displayValue ?? "–";
    };
    html += `<div class="modal-section-title">📊 Match Stats</div><div class="modal-stats-grid">`;
    for (const {name, label} of STAT_KEYS) {
      const vA = getVal(0, name);
      const vB = getVal(1, name);
      const numA = parseFloat(vA) || 0;
      const numB = parseFloat(vB) || 0;
      const tot  = numA + numB || 1;
      const pctA = Math.round((numA / tot) * 100);
      html += `
        <div class="stat-val-a">${vA}</div>
        <div class="stat-label">${label}</div>
        <div class="stat-val-b">${vB}</div>
        <div class="stat-bar-row">
          <div class="stat-bar-a" style="width:${pctA}%"></div>
          <div class="stat-bar-b" style="width:${100 - pctA}%"></div>
        </div>`;
    }
    html += `</div>`;
  }

  // Penalty shootout
  const pkPlays = (data.scoringPlays || []).filter(p => p.shootoutScore);
  if (pkPlays.length) {
    html += `<div class="modal-section-title">🥅 Penalty Shootout</div>`;
    const pkA = pkPlays.filter(p => p.team?.id === statsTeams[0]?.team?.id);
    const pkB = pkPlays.filter(p => p.team?.id === statsTeams[1]?.team?.id);
    const renderPKs = (shots, teamName) => {
      const dots = shots.map(s => {
        const scored = s.scoringPlay !== false && s.type?.text !== "Missed";
        return `<span class="pk-shot ${scored ? "scored" : "missed"}">${scored ? "✓" : "✗"}</span>`;
      }).join("");
      return `<div style="font-size:0.68rem;color:var(--text-sub);margin-bottom:3px">${teamName}</div><div class="modal-pks">${dots}</div>`;
    };
    if (pkA.length) html += renderPKs(pkA, statsTeams[0]?.team?.displayName || m.teamA || "");
    if (pkB.length) html += renderPKs(pkB, statsTeams[1]?.team?.displayName || m.teamB || "");
  }

  return html || '<div class="modal-empty">No stats available yet</div>';
}

/* ── MAIN LOOP ───────────────────────────────────────────────────────────── */
async function refresh() {
  try {
    const events = await fetchESPN();
    processEvents(events);
    render();
    renderLeaderboard();
  } catch (e) {}
}

initState();
render();
renderLeaderboard();
refresh();
setInterval(refresh, 5 * 60 * 1000);
</script>
