<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NCYSD World Cup 2026</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <meta property="og:title"       content="NCYSD World Cup 2026">
  <meta property="og:description" content="Friend group bracket pool — track your teams through the knockout rounds.">
  <meta property="og:image"       content="https://ncysdworldcup2026.netlify.app/og-image.png">
  <meta property="og:url"         content="https://ncysdworldcup2026.netlify.app/">
  <meta property="og:type"        content="website">
  <meta name="twitter:card"       content="summary_large_image">
  <meta name="twitter:image"      content="https://ncysdworldcup2026.netlify.app/og-image.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Design tokens ───────────────────────────────────────────── */
    :root {
      --bg:          linear-gradient(155deg, #faf8f3 0%, #f5f0e8 50%, #faf7f0 100%);
      --glass:       rgba(255,255,255,0.72);
      --glass-hover: rgba(255,255,255,0.88);
      --border:      rgba(180,150,100,0.18);
      --border-mid:  rgba(180,150,100,0.32);
      --text:        #3d2f1a;
      --text-sub:    #7a6145;
      --text-faint:  #b09a7a;
      --green:       #16a34a;
      --green-glow:  rgba(22,163,74,0.12);
      --gold:        #ca8a04;
      --gold-glow:   rgba(202,138,4,0.15);
      --red:         #dc2626;
      --connector:   rgba(180,150,100,0.25);
    }

    body {
      background: var(--bg); background-attachment: fixed;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      min-height: 100vh;
    }

    /* ── Header ──────────────────────────────────────────────────── */
    header {
      text-align: center;
      padding: 48px 20px 28px;
      border-bottom: 1px solid var(--border);
    }
    header h1 {
      font-size: clamp(1.4rem, 4vw, 2.4rem); font-weight: 800; letter-spacing: -0.5px;
      color: var(--text);
    }
    header p { margin-top: 10px; color: var(--text-sub); font-size: 0.85rem; letter-spacing: 0.4px; }
/* ── Legend ──────────────────────────────────────────────────── */
    .legend {
      display: flex; flex-wrap: wrap; justify-content: center;
      gap: 5px 12px; padding: 16px 24px 0; max-width: 960px; margin: 0 auto;
    }
    .legend-item { font-size: 0.67rem; color: var(--text-faint); }
    .legend-item b { color: var(--text-sub); font-weight: 600; }

    /* ── Bracket ─────────────────────────────────────────────────── */
    .bracket-wrapper { overflow-x: auto; padding: 28px 32px 64px; -webkit-overflow-scrolling: touch; }
    .bracket { display: flex; align-items: flex-start; gap: 6px; min-width: max-content; margin: 0 auto; }

    .round-col { display: flex; flex-direction: column; }
    .round-label {
      height: 30px; display: flex; align-items: center; justify-content: center;
      font-size: 0.58rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1.6px; color: var(--text-faint);
    }
    .final-col .round-label {
      color: var(--gold); letter-spacing: 2px;
    }
    .slot { display: flex; align-items: center; justify-content: center; padding: 4px 0; }

    /* ── Match card ──────────────────────────────────────────────── */
    .match {
      width: 172px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden; flex-shrink: 0;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      transition: border-color 0.35s, box-shadow 0.35s, background 0.35s;
      cursor: pointer;
    }
    .match:hover {
      background: var(--glass-hover);
      border-color: var(--border-mid);
      box-shadow: 0 6px 28px rgba(0,0,0,0.45);
    }

    /* Final card — gold shimmer */
    .final-col .match {
      width: 174px;
      background: rgba(202,138,4,0.06);
      border-color: rgba(202,138,4,0.35);
      box-shadow: 0 0 24px var(--gold-glow), 0 4px 16px rgba(0,0,0,0.08);
    }
    .final-col .match:hover {
      box-shadow: 0 0 36px var(--gold-glow), 0 6px 24px rgba(0,0,0,0.1);
    }

    /* ── Match footer ────────────────────────────────────────────── */
    .match-footer {
      font-size: 0.57rem; color: var(--text-faint); text-align: center;
      padding: 3px 6px 4px; border-top: 1px solid var(--border);
      letter-spacing: 0.3px;
    }
    .match-footer.live  { color: var(--red); font-weight: 700; letter-spacing: 1px; }
    .match-footer.final { color: var(--text-sub); }
    .match-venue {
      font-size: 0.53rem; color: var(--text-faint); text-align: center;
      padding: 2px 6px 4px; letter-spacing: 0.2px; opacity: 0.8;
    }
    .odds-pct {
      display: inline-block; margin-left: 5px;
      font-size: 0.55rem; font-weight: 600;
      color: var(--text-faint); vertical-align: middle;
      background: rgba(0,0,0,0.04); border-radius: 3px;
      padding: 1px 4px; letter-spacing: 0;
    }
    .odds-pct.fav { background: rgba(22,163,74,0.12); color: var(--green); }
    .odds-pct.dog { background: rgba(220,38,38,0.10); color: var(--red); }
    .modal-odds {
      display: flex; justify-content: space-between; align-items: center;
      border-top: 1px solid var(--border); padding-top: 8px; margin-top: 8px;
      font-size: 0.68rem; gap: 4px;
    }
    .modal-odds .o-team { color: var(--text-sub); font-weight: 700; text-align: center; flex: 1; }
    .modal-odds .o-draw { color: var(--text-faint); text-align: center; font-size: 0.6rem; flex: 0.8; }

    /* ── Team row ────────────────────────────────────────────────── */
    .team { padding: 8px 10px 7px; display: flex; align-items: center; position: relative; }
    .team:first-child { border-bottom: 1px solid var(--border); }
    .team { transition: background 0.35s, opacity 0.35s; }

    .team.winner { background: var(--green-glow); }
    .team.loser  { opacity: 0.28; }

    .flag { font-size: 0.9rem; flex-shrink: 0; margin-right: 6px; }

    .team-info { flex: 1; min-width: 0; }
    .team-name {
      font-size: 0.76rem; font-weight: 600; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; color: var(--text);
    }
    .team-name.tbd { color: var(--text-faint); font-style: italic; font-weight: 400; }
    .owner { font-size: 0.62rem; color: var(--text-faint); white-space: nowrap; }

    .score {
      font-size: 0.82rem; font-weight: 700; color: var(--text-sub);
      margin-left: 6px; flex-shrink: 0; transition: color 0.35s;
    }
    .score.winning { color: var(--green); }

    /* ── Winner glow ─────────────────────────────────────────────── */
    .match.has-winner .team.winner {
      box-shadow: inset 3px 0 0 var(--green);
    }
    .final-col .match.has-winner .team.winner {
      box-shadow: inset 3px 0 0 var(--gold);
    }

    /* ── Connector lines ─────────────────────────────────────────── */
    .connector-col { width: 14px; display: flex; flex-direction: column; }
    .conn-pair { position: relative; flex-shrink: 0; }

    .left-conn .conn-pair::before {
      content: ''; position: absolute; top: 25%; left: 0;
      width: 100%; height: 50%;
      border-top: 1px solid var(--connector);
      border-right: 1px solid var(--connector);
      border-bottom: 1px solid var(--connector);
    }
    .right-conn .conn-pair::before {
      content: ''; position: absolute; top: 25%; left: 0;
      width: 100%; height: 50%;
      border-top: 1px solid var(--connector);
      border-left: 1px solid var(--connector);
      border-bottom: 1px solid var(--connector);
    }
    /* Trophy above Final */
    .slot.final-slot { flex-direction: column; gap: 10px; }
    .trophy-icon { font-size: 2.2rem; line-height: 1; text-align: center; }

    .straight-conn { position: relative; width: 14px; }
    .straight-conn::before {
      content: ''; position: absolute; top: 50%; left: 0;
      width: 100%; height: 0;
      border-top: 1px solid var(--connector);
    }

    /* ── Leaderboard ─────────────────────────────────────────────── */
    .leaderboard-section { max-width: 980px; margin: 0 auto; padding: 0 24px 72px; }
    .leaderboard-title {
      font-size: 0.6rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 2px; color: var(--text-faint); text-align: center;
      padding: 28px 0 18px; border-top: 1px solid var(--border);
    }
    .leaderboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(178px, 1fr));
      gap: 10px;
    }
    .lb-card {
      background: var(--glass); border: 1px solid var(--border); border-radius: 10px;
      padding: 13px 15px;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .lb-card.leader {
      border-color: rgba(22,163,74,0.5);
      background: rgba(22,163,74,0.08);
      box-shadow: 0 0 16px rgba(22,163,74,0.12);
    }
    .lb-name { font-size: 0.85rem; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .lb-counts { font-size: 0.65rem; color: var(--text-sub); margin-bottom: 8px; }
    .lb-counts b { color: var(--green); }
    .lb-teams { display: flex; flex-direction: column; gap: 3px; }
    .lb-team { font-size: 0.71rem; color: var(--text-sub); white-space: nowrap; }
    .lb-team.out { color: var(--text-faint); text-decoration: line-through; opacity: 0.6; }
    .lb-rank { font-size: 0.65rem; color: var(--text-faint); float: right; }
    .lb-champ-badge {
      font-size: 0.65rem; font-weight: 700; color: var(--gold);
      background: var(--gold-glow); border-radius: 4px; padding: 1px 6px;
      margin-left: 6px; vertical-align: middle;
    }
    .lb-champ-pct {
      font-size: 0.6rem; color: var(--gold); font-weight: 600;
      margin-left: 5px; opacity: 0.85;
    }

    /* ── Match detail modal ──────────────────────────────────────── */
    #match-modal {
      display: none; position: fixed; inset: 0; z-index: 500;
      align-items: center; justify-content: center;
      padding: 16px;
      transition: opacity 0.28s ease;
    }
    #match-modal.open { display: flex; }
    .modal-backdrop {
      position: absolute; inset: 0;
      background: rgba(40,28,10,0.45);
      backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
    }
    .modal-scene {
      position: relative; perspective: 1000px;
      width: 100%; max-width: 340px;
      max-height: calc(100svh - 32px);
      max-height: calc(100dvh - 32px);
    }
    .modal-card {
      width: 100%;
      min-height: 260px;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.55s ease;
    }
    .modal-card.flipped { transform: rotateY(180deg); }
    .modal-front, .modal-back {
      width: 100%; min-height: 260px;
      backface-visibility: hidden; -webkit-backface-visibility: hidden;
      border-radius: 14px;
      background: var(--glass);
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      border: 1px solid var(--border-mid);
      box-shadow: 0 12px 40px rgba(0,0,0,0.25);
      padding: 18px 16px 14px;
    }
    .modal-back {
      position: absolute; inset: 0;
      transform: rotateY(180deg);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      max-height: calc(100svh - 32px);
      max-height: calc(100dvh - 32px);
    }
    @media (max-width: 480px) {
      #match-modal { align-items: flex-start; padding-top: max(env(safe-area-inset-top, 12px), 12px); }
      .bet-submit { width: 100%; padding: 10px; font-size: 0.82rem; }
    }
    /* Touch devices: force 16px on inputs so iOS never auto-zooms */
    @media (hover: none) and (pointer: coarse) {
      .bet-select, .bet-amount { font-size: 16px !important; padding: 8px 10px !important; }
    }
    .modal-close {
      position: absolute; top: 10px; right: 12px;
      background: none; border: none; cursor: pointer;
      font-size: 1rem; color: var(--text-faint); line-height: 1;
      padding: 2px 4px; border-radius: 4px;
    }
    .modal-close:hover { color: var(--text); background: rgba(0,0,0,0.06); }
    .modal-teams {
      display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px;
    }
    .modal-team-row {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 0.85rem; font-weight: 600; color: var(--text);
    }
    .modal-team-row .score {
      font-size: 1.2rem; font-weight: 800; color: var(--text); min-width: 22px; text-align: center;
    }
    .modal-team-row.winner { color: var(--green); }
    .modal-team-row .owner-tag {
      font-size: 0.62rem; font-weight: 400; color: var(--text-faint); margin-left: 6px;
    }
    .modal-meta {
      font-size: 0.62rem; color: var(--text-faint); text-align: center;
      border-top: 1px solid var(--border); padding-top: 8px; letter-spacing: 0.3px;
    }
    .modal-section-title {
      font-size: 0.62rem; font-weight: 700; letter-spacing: 1px;
      color: var(--text-sub); text-transform: uppercase;
      margin: 12px 0 6px;
    }
    .modal-scorers { display: flex; flex-direction: column; gap: 4px; }
    .modal-scorer-row {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.74rem; color: var(--text);
    }
    .modal-scorer-row .minute {
      font-size: 0.62rem; color: var(--text-faint); min-width: 28px;
    }
    .modal-scorer-row .goal-type {
      font-size: 0.62rem; color: var(--text-faint); margin-left: 2px;
    }
    .modal-stats-grid {
      display: grid; grid-template-columns: 1fr auto 1fr;
      gap: 5px 8px; align-items: center;
    }
    .stat-val-a { text-align: right; font-size: 0.78rem; font-weight: 600; color: var(--text); }
    .stat-label { text-align: center; font-size: 0.58rem; color: var(--text-faint); letter-spacing: 0.3px; }
    .stat-val-b { text-align: left; font-size: 0.78rem; font-weight: 600; color: var(--text); }
    .stat-bar-row {
      grid-column: 1 / -1;
      display: flex; height: 3px; border-radius: 2px; overflow: hidden;
      margin-bottom: 2px;
    }
    .stat-bar-a { background: var(--gold); }
    .stat-bar-b { background: var(--border-mid); }
    .modal-pks { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin-top: 4px; }
    .pk-shot {
      font-size: 0.68rem; padding: 2px 6px; border-radius: 4px;
      border: 1px solid var(--border);
    }
    .pk-shot.scored { color: var(--green); border-color: var(--green); }
    .pk-shot.missed { color: var(--red); border-color: var(--red); opacity: 0.7; }
    .modal-empty { font-size: 0.72rem; color: var(--text-faint); text-align: center; padding: 20px 0; }
    .odds-blurb { margin-top: 4px; }
    .odds-blurb-q { font-size: 0.72rem; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .odds-blurb-bar { height: 6px; border-radius: 3px; background: var(--border); overflow: hidden; margin-bottom: 4px; }
    .odds-blurb-fill { height: 100%; background: var(--gold); border-radius: 3px; }
    .odds-blurb-labels { display: flex; justify-content: space-between; font-size: 0.6rem; color: var(--text-faint); margin-bottom: 8px; }
    .odds-blurb-explain { font-size: 0.68rem; color: var(--text-sub); line-height: 1.5; background: rgba(0,0,0,0.03); border-radius: 6px; padding: 7px 9px; }

    /* ── Bets & Tally ────────────────────────────────────────────── */
    .bets-section {
      max-width: 960px; margin: 32px auto 48px; padding: 0 24px;
    }
    .bets-title {
      font-size: 1.05rem; font-weight: 800; color: var(--text);
      margin-bottom: 18px; letter-spacing: -0.3px;
    }
    .tally-grid {
      display: flex; flex-direction: column; gap: 8px; margin-bottom: 28px;
    }
    .tally-row {
      display: flex; align-items: center; gap: 8px;
      background: var(--glass); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 14px;
      font-size: 0.82rem;
    }
    .tally-debtor  { font-weight: 700; color: var(--red); }
    .tally-owes    { color: var(--text-faint); }
    .tally-creditor{ font-weight: 700; color: var(--green); }
    .tally-amount  { margin-left: auto; font-weight: 800; color: var(--text); }
    .tally-even    { color: var(--text-faint); font-style: italic; font-size: 0.78rem; }
    .bets-empty    { color: var(--text-faint); font-size: 0.78rem; font-style: italic; }
    .bet-match-group { margin-bottom: 16px; }
    .bet-match-label {
      font-size: 0.72rem; font-weight: 700; color: var(--text-sub);
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
    }
    .bet-row {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--glass); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 12px; margin-bottom: 5px;
      font-size: 0.75rem; color: var(--text-sub); gap: 8px;
    }
    .bet-side   { font-weight: 600; color: var(--text); }
    .bet-status { font-size: 0.68rem; white-space: nowrap; color: var(--text-faint); }
    /* Modal bet form */
    .modal-bets-divider { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
    .modal-bet-row {
      font-size: 0.7rem; color: var(--text-sub); margin-bottom: 5px; line-height: 1.4;
    }
    .bet-form { display: flex; flex-direction: column; gap: 8px; }
    .bet-form-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .bet-form-vs { font-size: 0.65rem; color: var(--text-faint); text-align: center; }
    .bet-select {
      font-size: 0.68rem; color: var(--text); background: rgba(255,255,255,0.6);
      border: 1px solid var(--border-mid); border-radius: 6px;
      padding: 4px 6px; flex: 1; min-width: 0;
    }
    .bet-amount {
      font-size: 0.68rem; color: var(--text); background: rgba(255,255,255,0.6);
      border: 1px solid var(--border-mid); border-radius: 6px; padding: 4px 6px;
    }
    .bet-submit {
      background: var(--gold); color: #fff; border: none; border-radius: 8px;
      padding: 7px 14px; font-size: 0.72rem; font-weight: 700; cursor: pointer;
      margin-top: 2px; transition: opacity 0.2s;
    }
    .bet-submit:hover { opacity: 0.85; }
    .bet-form-label { font-size: 0.65rem; color: var(--text-faint); }
    .bet-preview { font-size: 0.66rem; color: var(--text-sub); line-height: 1.7; background: rgba(0,0,0,0.03); border-radius: 6px; padding: 6px 9px; margin-top: 2px; }
    .bet-row { flex-wrap: wrap; }
    .bet-row-payout { width: 100%; font-size: 0.62rem; color: var(--text-faint); margin-top: 3px; }
    .bet-delete {
      background: none; border: 1px solid var(--border); border-radius: 5px;
      font-size: 0.61rem; color: var(--text-faint); cursor: pointer; padding: 2px 7px;
      margin-left: auto; flex-shrink: 0; transition: color 0.2s, border-color 0.2s;
    }
    .bet-delete:hover { border-color: var(--red); color: var(--red); }
    .odds-payout-box { font-size: 0.66rem; color: var(--text-sub); line-height: 1.65; background: rgba(202,138,4,0.06); border: 1px solid rgba(202,138,4,0.22); border-radius: 7px; padding: 8px 11px; margin-top: 8px; }
    .odds-payout-title { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.5px; color: var(--text-sub); text-transform: uppercase; margin-bottom: 4px; }
    .bet-confirm { text-align: center; padding: 18px 0 10px; font-size: 0.88rem; font-weight: 700; color: var(--green); }
    .bet-confirm-sub { text-align: center; font-size: 0.68rem; color: var(--text-faint); margin-top: 4px; }
  </style>
</head>
<body>

<div id="match-modal">
  <div class="modal-backdrop" onclick="closeMatchModal()"></div>
  <div class="modal-scene">
    <div class="modal-card" id="modal-card">
      <div class="modal-front" id="modal-front"></div>
      <div class="modal-back" id="modal-back">
        <button class="modal-close" onclick="closeMatchModal()">✕</button>
        <div id="modal-back-content"></div>
        <div id="modal-bet-zone"></div>
      </div>
    </div>
  </div>
</div>

<header>
  <h1>⚽ NCYSD World Cup 2026</h1>
  <p style="margin-top:8px;font-size:0.88rem;font-weight:700;color:var(--gold);letter-spacing:0.3px">⭐ Click any game to place bets & see live odds ⭐</p>
  <p style="margin-top:5px;font-size:0.75rem;color:var(--text-faint)">All bets & earnings are tracked at the bottom of the page 💸</p>
</header>

<div class="legend" id="legend"></div>
<div class="bracket-wrapper"><div class="bracket" id="bracket"></div></div>
<div class="leaderboard-section">
  <div class="leaderboard-title">Leaderboard</div>
  <div class="leaderboard-grid" id="leaderboard"></div>
</div>

<div class="bets-section">
  <div class="bets-title">💸 Bets & Tally</div>
  <div class="tally-grid" id="tally-grid"><div class="bets-empty">No settled bets yet.</div></div>
  <div id="bets-list"><div class="bets-empty">No bets placed yet. Click any match card to add one.</div></div>
</div>

<script>
/* ── OWNERSHIP (hardcoded – never AI-generated) ──────────────────────────── */
const OWNERSHIP = {

// matches: matchNum → { teamA, teamB, scoreA, scoreB, status, winner }
//   status: "upcoming" | "live" | "final"
//   winner: "A" | "B" | null
const state = { matches: {}, outrights: {} };

function initState() {
  for (const [num, d] of Object.entries(INITIAL)) {
    state.matches[+num] = {
      teamA: d.teamA || null,
      teamB: d.teamB || null,

      venue: null, odds: null,

/* ── ESPN NAME NORMALIZATION ─────────────────────────────────────────────── */
// Strip accents/punctuation/spaces for fuzzy matching
function norm(s) { return s.toLowerCase().replace(/[^a-z]/g, ""); }

const ESPN_TO_MINE = {
  "unitedstates": "USA",
  "cotedivoire":  "Ivory Coast",
  "curacao":      "Curacao",       // strips ç→ same
  "bosniaandherzegovina": "Bosnia",
  "drcongo":      "Congo",
  "republicofcongo": "Congo",
  "capeverde":    "Cape Verde",
  "southkorea":   "South Korea",
};

function espnName(raw) {
  const key = norm(raw);
  return ESPN_TO_MINE[key] || raw;
}

/* ── BUILD TEAM LOOKUP (team name → match slot) ──────────────────────────── */
function buildTeamLookup() {
  const map = {};
  for (const [num, m] of Object.entries(state.matches)) {
    if (m.teamA) map[norm(m.teamA)] = +num;
    if (m.teamB) map[norm(m.teamB)] = +num;
  }
  return map;
}

/* ── FETCH ESPN ──────────────────────────────────────────────────────────── */
const ESPN = "https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard";

const KNOCKOUT_DATES = [
  "20260628","20260629","20260630",
  "20260701","20260702","20260703",
  "20260704","20260705","20260706","20260707",
  "20260709","20260710","20260711",
  "20260714","20260715","20260719",
];

async function fetchESPN() {
  const results = await Promise.all(
    KNOCKOUT_DATES.map(d =>
      fetch(`${ESPN}?dates=${d}`)
        .then(r => r.json())
        .then(j => j.events || [])
        .catch(() => [])
    )
  );
  return results.flat();
}

/* ── PROCESS ESPN EVENTS INTO STATE ──────────────────────────────────────── */
function buildDateLookup() {
  const map = {};
  for (const [num, m] of Object.entries(state.matches)) {
    if (!m.date) continue;
    if (!map[m.date]) map[m.date] = [];
    map[m.date].push(+num);
  }
  return map;
}

function processEvents(events) {
  const lookup     = buildTeamLookup();
  const dateLookup = buildDateLookup();

  for (const ev of events) {
    const comp = ev.competitions?.[0];
    if (!comp) continue;
    const [c0, c1] = comp.competitors || [];
    if (!c0 || !c1) continue;

    const tA = espnName(c0.team?.displayName || "");
    const tB = espnName(c1.team?.displayName || "");
    const sA = c0.score ?? null;
    const sB = c1.score ?? null;
    const wA = c0.winner === true;
    const wB = c1.winner === true;
    const espnStatus = ev.status?.type?.name || "";

    // Primary: match by team name
    const slotA = lookup[norm(tA)];
    const slotB = lookup[norm(tB)];
    let slotNum = slotA ?? slotB;

    // Fallback: match by date + approximate ET hour when both teams were TBD
    if (!slotNum && ev.date) {
      const evDate = ev.date.slice(0, 10).replace(/-/g, "");
      const dateSlots = dateLookup[evDate] || [];
      const utcHour = new Date(ev.date).getUTCHours();
      const etHour  = (utcHour - 4 + 24) % 24; // EDT summer offset
      const unset   = dateSlots.filter(n => !state.matches[n].teamA && !state.matches[n].teamB);
      if (unset.length === 1) {
        slotNum = unset[0];
      } else {
        slotNum = unset.find(n => {
          const slot = state.matches[n];
          if (!slot.timeET) return false;
          const [time, period] = slot.timeET.split(" ");
          let h = +time.split(":")[0];
          if (period === "PM" && h !== 12) h += 12;
          if (period === "AM" && h === 12) h = 0;
          return Math.abs(h - etHour) <= 1;
        });
      }
    }

    if (!slotNum || !state.matches[slotNum]) continue;

    const m = state.matches[slotNum];

    // Fill unknown teams
    if (!m.teamA) { m.teamA = tA; lookup[norm(tA)] = slotNum; }
    if (!m.teamB) { m.teamB = tB; lookup[norm(tB)] = slotNum; }
    if (slotA && !slotB) { m.teamB = tB; lookup[norm(tB)] = slotNum; }
    if (slotB && !slotA) { m.teamA = tA; lookup[norm(tA)] = slotNum; }

    m.eventId = ev.id || null;
    m.scoreA = sA;
    m.scoreB = sB;
    m.status = espnStatus === "STATUS_FULL_TIME"    ? "final"
             : espnStatus === "STATUS_IN_PROGRESS"  ? "live"
             : "upcoming";
    m.winner = wA ? "A" : wB ? "B" : null;

    const v = comp.venue;
    if (v) {
      const city  = v.address?.city;
      const state2 = v.address?.state;
      const country = v.address?.country;
      if (city) {
        m.venue = (state2 && country === "US") ? `${city}, ${state2}` : city;
      } else if (v.fullName) {
        m.venue = v.fullName;
      }
    }
  }
}

/* ── TIME CONVERSION: ET → PT (PT = ET − 3h in summer) ──────────────────── */
function etToPT(timeET) {
  if (!timeET) return "";
  const [time, period] = timeET.split(" ");
  let [h, m] = time.split(":").map(Number);
  if (period === "PM" && h !== 12) h += 12;
  if (period === "AM" && h === 12) h = 0;
  h -= 3;
  if (h < 0) h += 24;
  const ampm = h >= 12 ? "PM" : "AM";
  const h12  = h % 12 || 12;
  return `${h12}:${String(m).padStart(2,"0")} ${ampm} PT`;
}

const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function formatDate(dateStr) {
  if (!dateStr) return "";
  const m = +dateStr.slice(4, 6), d = +dateStr.slice(6, 8);
  return `${MONTHS[m - 1]} ${d}`;
}

/* ── RENDER ──────────────────────────────────────────────────────────────── */
function impliedPcts(odds) {
  if (!odds) return { pctA: null, pctB: null };
  const raw = p => p > 0 ? 100 / (p + 100) : Math.abs(p) / (Math.abs(p) + 100);
  const rA = odds.priceA != null ? raw(odds.priceA) : 0;
  const rD = odds.priceDraw != null ? raw(odds.priceDraw) : 0;
  const rB = odds.priceB != null ? raw(odds.priceB) : 0;
  const sum = rA + rD + rB || 1;
  return {
    pctA:    rA ? Math.round(rA / sum * 100) : null,
    pctDraw: rD ? Math.round(rD / sum * 100) : null,
    pctB:    rB ? Math.round(rB / sum * 100) : null,
  };
}

function teamRowHTML(teamKey, m) {
  const name = m[teamKey] || null;
  const isWinner = m.winner === (teamKey === "teamA" ? "A" : "B");
  const isLoser   = m.winner && !isWinner && m.status === "final";
  const score     = teamKey === "teamA" ? m.scoreA : m.scoreB;

  if (!name) {
    return `<div class="team"><div class="flag"></div><div class="team-info"><div class="team-name tbd">TBD</div></div></div>`;
  }

  const flag  = FLAGS[name]     || "🏳️";
  const owner = OWNERSHIP[name] || "";
  const scoreHTML = score != null
    ? `<div class="score${isWinner ? " winning" : ""}">${score}</div>` : "";

  let pctTag = "";
  if (m.odds && m.status === "upcoming") {
    const pcts = impliedPcts(m.odds);
    const pct  = teamKey === "teamA" ? pcts.pctA : pcts.pctB;
    const other = teamKey === "teamA" ? pcts.pctB : pcts.pctA;
    if (pct !== null) {
      const cls = pct > other ? "fav" : pct < other ? "dog" : "";
      pctTag = `<span class="odds-pct${cls ? " " + cls : ""}">${pct}%</span>`;
    }
  }

  return `<div class="team${isWinner?" winner":""}${isLoser?" loser":""}">
    <span class="flag">${flag}</span>
    <div class="team-info">
      <div class="team-name">${name}${pctTag}</div>
      ${owner ? `<div class="owner">${owner}</div>` : ""}
    </div>
    ${scoreHTML}
  </div>`;
}

function matchCardHTML(matchNum) {
  const m = state.matches[matchNum];
  if (!m) return `<div class="match"><div class="team"><div class="team-name tbd">TBD</div></div><div class="team"><div class="team-name tbd">TBD</div></div></div>`;

  const hasWinner = m.winner && m.status === "final";
  const footerCls = m.status === "live" ? "live" : m.status === "final" ? "final" : "";
  let footer = "";
  if (m.status === "live")       footer = "🔴 LIVE";
  else if (m.status === "final") footer = `FINAL · ${formatDate(m.date)}`;
  else if (m.timeET)             footer = `${formatDate(m.date)} · ${etToPT(m.timeET)}`;

  return `<div class="match${hasWinner ? " has-winner" : ""}" onclick="openMatchModal(${matchNum})" title="Click for match details">
    ${teamRowHTML("teamA", m)}
    ${teamRowHTML("teamB", m)}
    ${footer ? `<div class="match-footer ${footerCls}">${footer}</div>` : ""}
    ${m.venue ? `<div class="match-venue">📍 ${m.venue}</div>` : ""}
  </div>`;
}

// Bracket tree connector columns
function buildConnector(numPairs, slotPx, direction) {
  const pairHeight = slotPx * 2;
  const pairs = Array.from({length: numPairs}, () =>
    `<div class="conn-pair" style="height:${pairHeight}px"></div>`
  ).join("");
  return `<div class="round-col">
    <div class="round-label"></div>
    <div class="connector-col ${direction}-conn">${pairs}</div>
  </div>`;
}

function buildConnectorStraight() {
  return `<div class="round-col">
    <div class="round-label"></div>
    <div class="straight-conn" style="height:${H}px"></div>
  </div>`;
}

function buildCol(label, matchNums, slotPx, cls = "") {
  const isFinal = cls === "final-col";
  const slots = matchNums
    .map(n => `<div class="slot${isFinal ? " final-slot" : ""}" style="height:${slotPx}px">${isFinal ? '<div class="trophy-icon">🏆</div>' : ""}${matchCardHTML(n)}</div>`)
    .join("");
  return `<div class="round-col ${cls}">
    <div class="round-label">${label}</div>${slots}</div>`;
}

/* ── LEADERBOARD ─────────────────────────────────────────────────────────── */
function computeLeaderboard() {
  // Teams that lost a knockout match
  const knocked = new Set();
  // Teams confirmed in the bracket (appeared in at least one slot via ESPN)
  const inBracket = new Set();

  for (const m of Object.values(state.matches)) {
    if (m.teamA) inBracket.add(m.teamA);
    if (m.teamB) inBracket.add(m.teamB);
    if (m.status === "final" && m.winner) {
      const loser = m.winner === "A" ? m.teamB : m.teamA;
      if (loser) knocked.add(loser);
    }
  }

  // Only apply "not in bracket" elimination if ESPN has loaded data for multiple teams
  const espnLoaded = inBracket.size >= 4;

  const hasOutrights = state.outrights && Object.keys(state.outrights).length > 0;

  return OWNERS
    .map(o => {
      const alive = o.teams.filter(t => {
        if (knocked.has(t)) return false;
        if (espnLoaded && !inBracket.has(t)) return false; // didn't make knockout stage
        return true;
      });
      const out = o.teams.filter(t => !alive.includes(t));
      const champPct = hasOutrights
        ? alive.reduce((s, t) => s + (teamOutrightPct(t) || 0), 0)
        : null;
      return { name: o.name, alive, out, champPct };
    })
    .sort((a, b) => {
      if (a.champPct !== null && b.champPct !== null) return b.champPct - a.champPct;
      return b.alive.length - a.alive.length || a.out.length - b.out.length;
    });
}

function renderLeaderboard() {
  const rows = computeLeaderboard();
  const hasOdds = rows.some(r => r.champPct !== null);
  const leader  = rows[0];

  document.getElementById("leaderboard").innerHTML = rows.map((r, i) => {
    const isLeader = hasOdds
      ? r.champPct === leader.champPct && r.champPct > 0
      : r.alive.length === leader.alive.length && r.alive.length > 0;

    const teamRows = [
      ...r.alive.map(t => {
        const pct = teamOutrightPct(t);
        const pctTag = pct !== null ? `<span class="lb-champ-pct">${pct}%</span>` : "";
        return `<div class="lb-team">${FLAGS[t] || ""} ${t}${pctTag}</div>`;
      }),
      ...r.out.map(t => `<div class="lb-team out">${FLAGS[t] || ""} ${t}</div>`),
    ].join("");

    const champBadge = r.champPct !== null
      ? `<span class="lb-champ-badge">🏆 ${r.champPct.toFixed(1)}%</span>` : "";

    return `<div class="lb-card${isLeader ? " leader" : ""}">
      <div class="lb-name">${i + 1}. ${r.name} ${champBadge}</div>
      <div class="lb-counts"><b>${r.alive.length}</b> alive · ${r.out.length} out</div>
      <div class="lb-teams">${teamRows}</div>
    </div>`;
  }).join("");
}

const summaryCache = {};

function openMatchModal(matchNum) {
  const m = state.matches[matchNum];
  if (!m) return;

  const modal = document.getElementById("match-modal");
  const card  = document.getElementById("modal-card");
  const front = document.getElementById("modal-front");
  const back  = document.getElementById("modal-back-content");

  card.classList.remove("flipped");
  front.innerHTML = buildModalFront(m);
  back.innerHTML  = '<div class="modal-empty">Loading…</div>';
  // Open directly on the back — no front-face tease
  card.classList.add("flipped");
  modal.classList.add("open");

  const noDataMsg = '<div class="modal-empty">No stats or betting odds available yet</div>';

  if (m.eventId) {
    fetchSummary(m.eventId).then(data => {
      back.innerHTML = buildModalBack(data, m);
    }).catch(() => {
      back.innerHTML = noDataMsg;
    });
  } else if (m.status === "upcoming") {
    // Show betting lines if we have them, otherwise generic message
    const bettingHtml = buildModalBack({}, m);
    back.innerHTML = bettingHtml.includes("modal-empty") ? noDataMsg : bettingHtml;
  } else {
    back.innerHTML = noDataMsg;
  }

  // Populate bet zone (always shown, updated live by Firestore listener)
  const betZone = document.getElementById("modal-bet-zone");
  if (betZone) {
    betZone.dataset.matchNum = matchNum;
    betZone.innerHTML = buildModalBetsSection(matchNum);
  }
}

function closeMatchModal() {
  // Blur focused input first so iOS restores zoom before the modal disappears
  if (document.activeElement && document.activeElement !== document.body) {
    document.activeElement.blur();
  }
  const modal = document.getElementById("match-modal");
  const card  = document.getElementById("modal-card");
  // Fade out without flipping back so the front face never teases
  modal.style.opacity = "0";
  setTimeout(() => {
    modal.classList.remove("open");
    modal.style.opacity = "";
    card.classList.remove("flipped");
  }, 280);
}

async function fetchSummary(eventId) {
  if (summaryCache[eventId]) return summaryCache[eventId];
  const r = await fetch(
    `https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/summary?event=${eventId}`
  );
  const data = await r.json();
  summaryCache[eventId] = data;
  return data;
}

  const tB   = m.teamB || "TBD";
  const owA  = OWNERSHIP[tA] || "";
  const owB  = OWNERSHIP[tB] || "";

  const scoreBlock = m.scoreA != null
    ? `<span class="score">${m.scoreA}</span>`
    : `<span class="score" style="opacity:0.2">–</span>`;
  const scoreBlockB = m.scoreB != null
    ? `<span class="score">${m.scoreB}</span>`
    : `<span class="score" style="opacity:0.2">–</span>`;

  let meta = "";
  if (m.status === "live")       meta = "🔴 LIVE";
  else if (m.status === "final") meta = `FINAL · ${formatDate(m.date)}`;
  else if (m.timeET)             meta = `${formatDate(m.date)} · ${etToPT(m.timeET)}`;
  if (m.venue) meta += (meta ? " · " : "") + m.venue;

function buildModalBack(data, m) {
  let html = "";

  // Goal scorers
  const plays = (data.scoringPlays || []).filter(p => !p.shootoutScore);
  if (plays.length) {
    html += `<div class="modal-section-title">⚽ Scorers</div><div class="modal-scorers">`;
    for (const p of plays) {
      const name    = p.athletesInvolved?.[0]?.shortName || p.athletesInvolved?.[0]?.displayName || "Unknown";
      const min     = p.clock?.displayValue || "";
      const typeRaw = (p.type?.text || p.scoringType?.displayName || "").toLowerCase();
      const tag     = typeRaw.includes("penalty") ? " (pen)" : typeRaw.includes("own") ? " (og)" : "";
      const teamAbv = p.team?.abbreviation || "";
      html += `<div class="modal-scorer-row"><span class="minute">${min}</span><span>${teamAbv} – ${name}${tag}</span></div>`;
    }
    html += `</div>`;
  }

  // Stats
  const statsTeams = data.statistics?.[0]?.teams || data.statistics?.teams || [];
  const STAT_KEYS = [
    {name:"possessionPct",  label:"Possession"},
    {name:"shotsOnTarget",  label:"Shots on Target"},
    {name:"shots",          label:"Total Shots"},
    {name:"cornerKicks",    label:"Corners"},
    {name:"fouls",          label:"Fouls"},
    {name:"yellowCards",    label:"Yellow Cards"},
    {name:"redCards",       label:"Red Cards"},
  ];
  if (statsTeams.length >= 2) {
    const getVal = (teamIdx, key) => {
      const stats = statsTeams[teamIdx]?.statistics || [];
      return stats.find(s => s.name === key)?.displayValue ?? "–";
    };
    html += `<div class="modal-section-title">📊 Match Stats</div><div class="modal-stats-grid">`;
    for (const {name, label} of STAT_KEYS) {
      const vA = getVal(0, name);
      const vB = getVal(1, name);
      const numA = parseFloat(vA) || 0;
      const numB = parseFloat(vB) || 0;
      const tot  = numA + numB || 1;
      const pctA = Math.round((numA / tot) * 100);
      html += `
        <div class="stat-val-a">${vA}</div>
        <div class="stat-label">${label}</div>
        <div class="stat-val-b">${vB}</div>
        <div class="stat-bar-row">
          <div class="stat-bar-a" style="width:${pctA}%"></div>
          <div class="stat-bar-b" style="width:${100 - pctA}%"></div>
        </div>`;
    }
    html += `</div>`;
  }

  // Penalty shootout
  const pkPlays = (data.scoringPlays || []).filter(p => p.shootoutScore);
  if (pkPlays.length) {
    html += `<div class="modal-section-title">🥅 Penalty Shootout</div>`;
    const pkA = pkPlays.filter(p => p.team?.id === statsTeams[0]?.team?.id);
    const pkB = pkPlays.filter(p => p.team?.id === statsTeams[1]?.team?.id);
    const renderPKs = (shots, teamName) => {
      const dots = shots.map(s => {
        const scored = s.scoringPlay !== false && s.type?.text !== "Missed";
        return `<span class="pk-shot ${scored ? "scored" : "missed"}">${scored ? "✓" : "✗"}</span>`;
      }).join("");
      return `<div style="font-size:0.68rem;color:var(--text-sub);margin-bottom:3px">${teamName}</div><div class="modal-pks">${dots}</div>`;
    };
    if (pkA.length) html += renderPKs(pkA, statsTeams[0]?.team?.displayName || m.teamA || "");
    if (pkB.length) html += renderPKs(pkB, statsTeams[1]?.team?.displayName || m.teamB || "");
  }

  // Over/Under + betting (upcoming matches only)
  if (m.status === "upcoming" && (m.oddsLine || m.oddsBtts || m.odds)) {
    html += `<div class="modal-section-title">📈 Vegas Says</div>`;
    if (m.oddsLine) {
      const line = m.oddsLine.line;
      const over = Math.ceil(line);
      const under = Math.floor(line);
      const highScore = m.oddsLine.overPct >= m.oddsLine.underPct;
      html += `<div class="odds-blurb">
        <div class="odds-blurb-q">Will this be a high-scoring game?</div>
        <div class="odds-blurb-bar">
          <div class="odds-blurb-fill" style="width:${m.oddsLine.overPct}%"></div>
        </div>
        <div class="odds-blurb-labels">
          <span>${m.oddsLine.overPct}% chance of ${over}+ goals</span>
          <span>${m.oddsLine.underPct}% chance of ${under} or fewer</span>
        </div>
        <div class="odds-blurb-explain">
          Bookmakers lean <b>${highScore ? "high-scoring" : "low-scoring"}</b>.
          If you bet the <b>over</b>, you win when ${over} or more total goals are scored.
          If you bet the <b>under</b>, you win when ${under} or fewer are scored.
        </div>
      </div>
      <div class="odds-payout-box">
        <div class="odds-payout-title">💰 Over/Under Bet Payouts</div>
        Payouts are odds-adjusted — the underdog pays out more than the favorite.
        If you bet $20 on <b>Over</b> (${m.oddsLine.overPct}% likely), you'd win
        <b>$${calcToWin(20, m.oddsLine.overPct, m.oddsLine.underPct).toFixed(2)}</b> if it hits.
        If you bet $20 on <b>Under</b> (${m.oddsLine.underPct}% likely), you'd win
        <b>$${calcToWin(20, m.oddsLine.underPct, m.oddsLine.overPct).toFixed(2)}</b> if it hits.
        Enter a bet below to see your exact payout before locking it in.
      </div>`;
    }
    if (m.odds && m.status === "upcoming") {
      const pcts = impliedPcts(m.odds);
      if (pcts.pctA !== null && pcts.pctB !== null) {
        const adjA = Math.round(pcts.pctA / (pcts.pctA + pcts.pctB) * 100);
        const adjB = 100 - adjA;
        html += `<div class="odds-payout-box" style="margin-top:6px">
          <div class="odds-payout-title">💰 Win/Draw/Loss Bet Payouts</div>
          Payouts are odds-adjusted — betting the underdog pays more. For a $20 bet:
          <b>${m.teamA || "Team A"} wins</b> (${adjA}% likely) → win <b>$${calcToWin(20, adjA, adjB).toFixed(2)}</b>.
          <b>${m.teamB || "Team B"} wins</b> (${adjB}% likely) → win <b>$${calcToWin(20, adjB, adjA).toFixed(2)}</b>.
          A draw is a push — no money changes hands.
        </div>`;
      }
    }
  }

  return html || '<div class="modal-empty">No stats or betting odds available yet</div>';
}

const ODDS_KEY = "8d41750fb07932bd3b95c0b32fa2bd1c";

async function fetchOddsMarket(markets, regions = "us") {
  const r = await fetch(
    `https://api.the-odds-api.com/v4/sports/soccer_fifa_world_cup/odds/?apiKey=${ODDS_KEY}&regions=${regions}&markets=${markets}&oddsFormat=american`
  );
  const data = await r.json();
  return Array.isArray(data) ? data : [];
}

async function fetchOutrights() {
  // Try both the dedicated outrights endpoint and the regular odds endpoint with outrights market
  const [a, b] = await Promise.all([
    fetch(`https://api.the-odds-api.com/v4/sports/soccer_fifa_world_cup/outrights/?apiKey=${ODDS_KEY}&regions=us&oddsFormat=american`)
      .then(r => r.json()).then(d => Array.isArray(d) ? d : []).catch(() => []),
    fetch(`https://api.the-odds-api.com/v4/sports/soccer_fifa_world_cup/odds/?apiKey=${ODDS_KEY}&regions=us&markets=outrights&oddsFormat=american`)
      .then(r => r.json()).then(d => Array.isArray(d) ? d : []).catch(() => []),
  ]);
  return [...a, ...b];
}

function rawImplied(price) {
  if (price == null) return 0;
  return price > 0 ? 100 / (price + 100) : Math.abs(price) / (Math.abs(price) + 100);
}

function processOdds(oddsData) {
  for (const ev of oddsData) {
    const nA = norm(espnName(ev.home_team || ""));
    const nB = norm(espnName(ev.away_team || ""));

    let slot = null;
    for (const [num, m] of Object.entries(state.matches)) {
      const mA = norm(m.teamA || ""), mB = norm(m.teamB || "");
      if ((mA === nA && mB === nB) || (mA === nB && mB === nA)) { slot = +num; break; }
    }
    if (!slot) continue;

    const m = state.matches[slot];
    for (const bookie of (ev.bookmakers || [])) {
      const h2h    = bookie.markets?.find(mk => mk.key === "h2h");
      const totals = bookie.markets?.find(mk => mk.key === "totals");
      const btts   = bookie.markets?.find(mk => mk.key === "btts");

      if (h2h && !m.odds) {
        const oc = h2h.outcomes || [];
        const findPrice = name => oc.find(o => norm(o.name) === norm(name))?.price ?? null;
        const priceA = findPrice(m.teamA), priceB = findPrice(m.teamB);
        const priceDraw = oc.find(o => o.name === "Draw")?.price ?? null;
        if (priceA !== null || priceB !== null)
          m.odds = { priceA, priceDraw, priceB };
      }

      if (totals && !m.oddsLine) {
        const ov = totals.outcomes?.find(o => o.name === "Over");
        const un = totals.outcomes?.find(o => o.name === "Under");
        if (ov) {
          const line = ov.point ?? 2.5;
          const rOv = rawImplied(ov.price), rUn = rawImplied(un?.price);
          const sum  = rOv + rUn || 1;
          m.oddsLine = { line, overPct: Math.round(rOv / sum * 100), underPct: Math.round(rUn / sum * 100), overPrice: ov.price, underPrice: un?.price ?? null };
        }
      }

      if (btts && !m.oddsBtts) {
        const yes = btts.outcomes?.find(o => o.name === "Yes");
        const no  = btts.outcomes?.find(o => o.name === "No");
        if (yes) {
          const rY = rawImplied(yes.price), rN = rawImplied(no?.price);
          const sum = rY + rN || 1;
          m.oddsBtts = { yesPct: Math.round(rY / sum * 100), noPct: Math.round(rN / sum * 100) };
        }
      }
    }
  }
}

function processOutrights(data) {
  state.outrights = {};
  const all = [];
  for (const ev of data) {
    const bookie = ev.bookmakers?.[0];
    const market = bookie?.markets?.find(mk => mk.key === "outrights");
    if (!market) continue;
    for (const o of (market.outcomes || [])) {
      all.push({ name: o.name, raw: rawImplied(o.price) });
    }
    break; // one event is the tournament
  }
  if (!all.length) return;
  const total = all.reduce((s, o) => s + o.raw, 0) || 1;
  for (const { name, raw } of all) {
    state.outrights[norm(name)] = +(raw / total * 100).toFixed(1);
  }
}

function teamOutrightPct(teamName) {
  if (!state.outrights || !teamName) return null;
  return state.outrights[norm(teamName)] ?? null;
}

async function mergeOddsData(a, b) {
  // Merge two odds arrays by event id so bookmakers from both calls combine
  const map = {};
  for (const ev of a) map[ev.id] = { ...ev, bookmakers: [...(ev.bookmakers || [])] };
  for (const ev of b) {
    if (map[ev.id]) map[ev.id].bookmakers.push(...(ev.bookmakers || []));
    else map[ev.id] = ev;
  }
  return Object.values(map);
}

let oddsLoaded = false;

async function loadOdds() {
  if (oddsLoaded) return;
  try {
    const [h2hData, extraData, outrightData] = await Promise.all([
      fetchOddsMarket("h2h").catch(() => []),
      fetchOddsMarket("totals", "uk,eu").catch(() => []),
      fetchOutrights().catch(() => []),
    ]);
    processOdds(await mergeOddsData(h2hData, extraData));
    processOutrights(outrightData);
    if (Object.values(state.matches).some(m => m.odds)) oddsLoaded = true;
  } catch (e) {}
}

async function refresh() {
  try {
    const events = await fetchESPN();
    processEvents(events);
    await loadOdds();
    render();
    renderLeaderboard();
  } catch (e) {}
}

function getSidePcts(side1, side2, m) {
  if (side1 === "over" || side1 === "under") {
    if (!m?.oddsLine) return { pct1: null, pct2: null };
    return {
      pct1: side1 === "over" ? m.oddsLine.overPct : m.oddsLine.underPct,
      pct2: side2 === "over" ? m.oddsLine.overPct : m.oddsLine.underPct,
    };
  }
  if ((side1 === "teamA" || side1 === "teamB") && (side2 === "teamA" || side2 === "teamB")) {
    if (!m?.odds) return { pct1: null, pct2: null };
    const pcts = impliedPcts(m.odds);
    const p1 = side1 === "teamA" ? (pcts.pctA || 0) : (pcts.pctB || 0);
    const p2 = side2 === "teamA" ? (pcts.pctA || 0) : (pcts.pctB || 0);
    const sum = p1 + p2 || 1;
    return { pct1: Math.round(p1 / sum * 100), pct2: Math.round(p2 / sum * 100) };
  }
  return { pct1: null, pct2: null };
}

function calcToWin(stake, myPct, otherPct) {
  if (!stake || !myPct || !otherPct) return stake || 0;
  return +(stake * otherPct / myPct).toFixed(2);
}

function sideResult(side, m) {
  if (!m || m.status !== "final") return "pending";
  if (side === "teamA") return m.winner === "A" ? "win" : m.winner === null ? "push" : "loss";
  if (side === "teamB") return m.winner === "B" ? "win" : m.winner === null ? "push" : "loss";
  if (side === "draw")  return m.winner === null ? "win" : "loss";
  if (side === "over" || side === "under") {
    if (m.scoreA == null || m.scoreB == null || !m.oddsLine) return "pending";
    const total = +m.scoreA + +m.scoreB;
    if (total === m.oddsLine.line) return "push";
    return ((side === "over") === (total > m.oddsLine.line)) ? "win" : "loss";
  }
  return "pending";
}

function sideName(side, m) {
  if (side === "teamA")  return `${m?.teamA || "Team A"} wins`;
  if (side === "teamB")  return `${m?.teamB || "Team B"} wins`;
  if (side === "draw")   return "Draw";
  if (side === "over")   return `Over ${m?.oddsLine?.line ?? 2.5} goals`;
  if (side === "under")  return `Under ${m?.oddsLine?.line ?? 2.5} goals`;
  return side;
}

function computeTally() {
  const tally = {};
  for (const bet of state.bets) {
    const m = state.matches[bet.matchNum];
    const r1 = sideResult(bet.side1, m);
    if (r1 === "pending" || r1 === "push") continue;
    const stake = +(bet.amount) || 0;
    if (!stake) continue;
    // toWin1 = what bettor1 wins if side1 hits; bettor2 wins `stake` if side2 hits
    const toWin1 = bet.toWin1 != null ? +bet.toWin1 : stake;
    const [a, b] = [bet.bettor1, bet.bettor2].sort();
    const key = `${a}|${b}`;
    if (!tally[key]) tally[key] = { a, b, net: 0 };
    const winner   = r1 === "win" ? bet.bettor1 : bet.bettor2;
    const winAmt   = r1 === "win" ? toWin1 : stake;
    tally[key].net += winner === a ? winAmt : -winAmt;
  }
  return Object.values(tally);
}

function renderTally() {
  const el = document.getElementById("tally-grid");
  if (!el) return;
  const rows = computeTally().filter(t => t.net !== 0)
    .sort((a, b) => Math.abs(b.net) - Math.abs(a.net));
  if (!rows.length) {
    el.innerHTML = '<div class="bets-empty">Tally appears once bets settle.</div>';
    return;
  }
  el.innerHTML = rows.map(t => {
    const [debtor, creditor, amt] = t.net > 0 ? [t.b, t.a, t.net] : [t.a, t.b, -t.net];
    return `<div class="tally-row">
      <span class="tally-debtor">${debtor}</span>
      <span class="tally-owes">owes</span>
      <span class="tally-creditor">${creditor}</span>
      <span class="tally-amount">$${amt.toFixed(2)}</span>
    </div>`;
  }).join("");
}

      const toWin1 = bet.toWin1 != null ? +bet.toWin1 : stake;
      const winner = r1 === "win" ? bet.bettor1 : r1 === "loss" ? bet.bettor2 : null;
      const winAmt = winner === bet.bettor1 ? toWin1 : stake;
      const { pct1, pct2 } = getSidePcts(bet.side1, bet.side2, m);
      const pct1Str = pct1 != null ? ` ${pct1}%` : "";
      const pct2Str = pct2 != null ? ` ${pct2}%` : "";
      const side1Label = sideName(bet.side1, m);
      const side2Label = sideName(bet.side2, m);
      const amtStr = stake ? ` · $${stake}` : "";
      const payoutLine = stake && r1 === "pending"
        ? `<div class="bet-row-payout">If ${side1Label}: ${bet.bettor1} collects $${toWin1.toFixed(2)} · If ${side2Label}: ${bet.bettor2} collects $${stake.toFixed(2)}</div>`
        : (winner ? `<div class="bet-row-payout" style="color:var(--green)">${winner} collects $${winAmt.toFixed(2)}</div>` : "");
      return `<div class="bet-row">
        <span>${icon} <b>${bet.bettor1}</b> <span class="bet-side">(${side1Label}${pct1Str})</span> vs <b>${bet.bettor2}</b> <span class="bet-side">(${side2Label}${pct2Str})</span>${amtStr}</span>
        ${bet.id ? `<button class="bet-delete" onclick="deleteBet('${bet.id}', this)">Delete</button>` : ""}
        ${payoutLine}
      </div>`;
    }).join("");
    return `<div class="bet-match-group"><div class="bet-match-label">${label}</div>${rows}</div>`;
  }).join("");
}

function buildModalBetsSection(matchNum) {
  const m = state.matches[matchNum];
  const matchBets = state.bets.filter(b => +b.matchNum === +matchNum);

  const sideOpts = [];
  if (m?.teamA) sideOpts.push({ v: "teamA", l: `${m.teamA} wins` });
  sideOpts.push({ v: "draw", l: "Draw" });
  if (m?.teamB) sideOpts.push({ v: "teamB", l: `${m.teamB} wins` });
  if (m?.oddsLine) {
    sideOpts.push({ v: "over",  l: `Over ${m.oddsLine.line} goals` });
    sideOpts.push({ v: "under", l: `Under ${m.oddsLine.line} goals` });
  }
  const sideHTML  = (sel) => sideOpts.map(o => `<option value="${o.v}"${o.v===sel?" selected":""}>${o.l}</option>`).join("");
  const nameHTML  = OWNERS.map(o => `<option value="${o.name}">${o.name}</option>`).join("");

  const existingHTML = matchBets.length ? `
    <hr class="modal-bets-divider">
    <div class="modal-section-title">💰 Bets on this game</div>
    ${matchBets.map(bet => {
      const r1 = sideResult(bet.side1, m);
      const icon = r1==="pending"?"⏳":r1==="win"?"🏆":r1==="push"?"🤝":"❌";
      const stake  = +(bet.amount) || 0;
      const toWin1 = bet.toWin1 != null ? +bet.toWin1 : stake;
      const winner = r1==="win" ? bet.bettor1 : r1==="loss" ? bet.bettor2 : null;
      const winAmt = winner === bet.bettor1 ? toWin1 : stake;
      const amtStr = stake ? ` · $${stake}` : "";
      const sub = r1 === "pending" && stake
        ? `<span style="font-size:0.6rem;color:var(--text-faint)"> (${bet.bettor1} wins $${toWin1.toFixed(2)} · ${bet.bettor2} wins $${stake.toFixed(2)})</span>`
        : (winner ? ` · <span style="color:var(--green)">🏆 ${winner} collects $${winAmt.toFixed(2)}</span>` : "");
      return `<div class="modal-bet-row" style="display:flex;align-items:baseline;justify-content:space-between;gap:6px">
        <span>${icon} <b>${bet.bettor1}</b> (${sideName(bet.side1,m)}) vs <b>${bet.bettor2}</b> (${sideName(bet.side2,m)})${amtStr}${sub}</span>
        ${bet.id ? `<button class="bet-delete" onclick="deleteBet('${bet.id}', this)" style="flex-shrink:0">Delete</button>` : ""}
      </div>`;
    }).join("")}` : "";

  const formHTML = m?.status === "upcoming" ? `
    <hr class="modal-bets-divider">
    <div class="modal-section-title">🎰 Place a bet</div>
    <div class="bet-form">
      <div class="bet-form-row">
        <select class="bet-select" id="bf-n1-${matchNum}">${nameHTML}</select>
        <span class="bet-form-label">takes</span>
        <select class="bet-select" id="bf-s1-${matchNum}" onchange="updateBetPreview(${matchNum})">${sideHTML("teamA")}</select>
      </div>
      <div class="bet-form-vs">— vs —</div>
      <div class="bet-form-row">
        <select class="bet-select" id="bf-n2-${matchNum}">${nameHTML}</select>
        <span class="bet-form-label">takes</span>
        <select class="bet-select" id="bf-s2-${matchNum}" onchange="updateBetPreview(${matchNum})">${sideHTML("teamB")}</select>
      </div>
      <div class="bet-form-row">
        <span class="bet-form-label">Bettor 1 risks $</span>
        <input class="bet-amount" id="bf-amt-${matchNum}" type="number" min="0" step="1" placeholder="0" oninput="updateBetPreview(${matchNum})">
      </div>
      <div id="bf-preview-${matchNum}" class="bet-preview"></div>
      <button class="bet-submit" onclick="submitBet(${matchNum})">Lock it in 🔒</button>
    </div>` : "";

  return existingHTML + formHTML;
}

async function submitBet(matchNum) {
  const n1  = document.getElementById(`bf-n1-${matchNum}`)?.value;
  const s1  = document.getElementById(`bf-s1-${matchNum}`)?.value;
  const n2  = document.getElementById(`bf-n2-${matchNum}`)?.value;
  const s2  = document.getElementById(`bf-s2-${matchNum}`)?.value;
  const amt = +document.getElementById(`bf-amt-${matchNum}`)?.value || 0;
  if (n1 === n2) { alert("Pick two different people!"); return; }
  const m = state.matches[+matchNum];
  const { pct1, pct2 } = getSidePcts(s1, s2, m);
  const toWin1 = calcToWin(amt, pct1, pct2);
  const btn = document.getElementById(`bf-amt-${matchNum}`)?.closest(".bet-form")?.querySelector(".bet-submit");
  if (btn) btn.textContent = "Saving…";
  await db.collection("bets").add({
    matchNum: +matchNum, bettor1: n1, side1: s1,
    bettor2: n2, side2: s2, amount: amt,
    toWin1: toWin1,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });
  // Clear modal content and show confirmation, then close the card
  const backContent = document.getElementById("modal-back-content");
  const betZone     = document.getElementById("modal-bet-zone");
  if (backContent) backContent.innerHTML = "";
  if (betZone) betZone.innerHTML = `
    <div style="text-align:center;padding:40px 0 12px;font-size:1.15rem;font-weight:800;color:var(--green)">✅ Locked in!</div>
    <div style="text-align:center;font-size:0.72rem;color:var(--text-faint);margin-top:4px">${n1} vs ${n2} · bet saved</div>
  `;
  window._betConfirming = true;
  setTimeout(() => {
    window._betConfirming = false;
    closeMatchModal();
  }, 1300);
}

function loadBets() {
  db.collection("bets").orderBy("createdAt", "asc").onSnapshot(snap => {
    state.bets = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderBets();
    renderTally();
    // Refresh modal bets if open (skip if confirmation message is showing)
    const modal = document.getElementById("match-modal");
    const betZone = document.getElementById("modal-bet-zone");
    if (modal?.classList.contains("open") && betZone?.dataset.matchNum && !window._betConfirming) {
      betZone.innerHTML = buildModalBetsSection(+betZone.dataset.matchNum);
    }
  });
}

loadBets();
</script>
</body>
</html>
