<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#faf8f3"/>
      <stop offset="50%"  stop-color="#f0e8d8"/>
      <stop offset="100%" stop-color="#faf7f0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#b8975a"/>
      <stop offset="100%" stop-color="#8c6d3a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft-shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#b8975a" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines (bracket aesthetic) -->
  <g stroke="#d4c4a0" stroke-width="1" opacity="0.35">
    <!-- Horizontal bracket lines -->
    <line x1="60" y1="157" x2="200" y2="157"/>
    <line x1="60" y1="236" x2="200" y2="236"/>
    <line x1="200" y1="157" x2="200" y2="236"/>
    <line x1="200" y1="196" x2="280" y2="196"/>

    <line x1="60" y1="394" x2="200" y2="394"/>
    <line x1="60" y1="473" x2="200" y2="473"/>
    <line x1="200" y1="394" x2="200" y2="473"/>
    <line x1="200" y1="433" x2="280" y2="433"/>

    <line x1="280" y1="196" x2="280" y2="433"/>
    <line x1="280" y1="314" x2="360" y2="314"/>

    <!-- Right side mirror -->
    <line x1="1140" y1="157" x2="1000" y2="157"/>
    <line x1="1140" y1="236" x2="1000" y2="236"/>
    <line x1="1000" y1="157" x2="1000" y2="236"/>
    <line x1="1000" y1="196" x2="920" y2="196"/>

    <line x1="1140" y1="394" x2="1000" y2="394"/>
    <line x1="1140" y1="473" x2="1000" y2="473"/>
    <line x1="1000" y1="394" x2="1000" y2="473"/>
    <line x1="1000" y1="433" x2="920" y2="433"/>

    <line x1="920" y1="196" x2="920" y2="433"/>
    <line x1="920" y1="314" x2="840" y2="314"/>
  </g>

  <!-- Decorative corner dots -->
  <circle cx="60" cy="157" r="4" fill="#c4a870" opacity="0.5"/>
  <circle cx="60" cy="236" r="4" fill="#c4a870" opacity="0.5"/>
  <circle cx="60" cy="394" r="4" fill="#c4a870" opacity="0.5"/>
  <circle cx="60" cy="473" r="4" fill="#c4a870" opacity="0.5"/>
  <circle cx="1140" cy="157" r="4" fill="#c4a870" opacity="0.5"/>
  <circle cx="1140" cy="236" r="4" fill="#c4a870" opacity="0.5"/>
  <circle cx="1140" cy="394" r="4" fill="#c4a870" opacity="0.5"/>
  <circle cx="1140" cy="473" r="4" fill="#c4a870" opacity="0.5"/>

  <!-- Center card -->
  <rect x="360" y="140" width="480" height="350" rx="20" fill="rgba(255,255,255,0.68)" filter="url(#soft-shadow)"/>
  <rect x="360" y="140" width="480" height="350" rx="20" fill="none" stroke="#c4a870" stroke-width="1.5" opacity="0.6"/>

  <!-- Trophy -->
  <text x="600" y="225" font-family="serif" font-size="72" text-anchor="middle">🏆</text>

  <!-- NCYSD -->
  <text x="600" y="318"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Georgia, serif"
    font-size="72" font-weight="800" letter-spacing="-1"
    text-anchor="middle" fill="url(#accent)" filter="url(#glow)">NCYSD</text>

  <!-- Divider line -->
  <rect x="460" y="332" width="280" height="2" rx="1" fill="url(#accent)" opacity="0.4"/>

  <!-- World Cup 2026 -->
  <text x="600" y="384"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Georgia, serif"
    font-size="34" font-weight="600" letter-spacing="2"
    text-anchor="middle" fill="#7a6145">WORLD CUP 2026</text>

  <!-- Soccer ball emoji -->
  <text x="600" y="448"
    font-family="serif" font-size="32"
    text-anchor="middle" opacity="0.75">⚽</text>

  <!-- Bottom tagline -->
  <text x="600" y="570"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="20" letter-spacing="3" text-anchor="middle" fill="#b09a7a" opacity="0.8">FRIEND GROUP BRACKET POOL</text>
</svg>
